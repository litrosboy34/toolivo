<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Filter Generator - Toolivo</title>
<meta name="description" content="Generate CSS filter effects instantly with live preview and copyable code.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;padding:20px}
.container{max-width:1000px;margin:auto}
.title{font-size:32px;font-weight:bold;margin-bottom:10px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{color:#94a3b8;margin-bottom:25px;line-height:1.6}
.card{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
.control{margin-bottom:18px}
label{display:block;margin-bottom:8px;color:#cbd5e1;font-size:14px}
input[type="range"]{width:100%;accent-color:#0ea5e9}
.value{margin-top:6px;color:#38bdf8;font-size:14px}
.preview{min-height:340px;background:#020617;border:1px solid #1e293b;border-radius:18px;display:flex;align-items:center;justify-content:center;padding:25px}
.preview-box{width:260px;height:180px;border-radius:18px;background:linear-gradient(135deg,#06b6d4,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:bold}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
button{padding:13px 20px;border:none;border-radius:12px;font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(90deg,#06b6d4,#3b82f6);color:white}
.copy{background:#1e293b;color:white}
.reset{background:#020617;color:white;border:1px solid #334155}
textarea{width:100%;height:190px;margin-top:18px;background:#020617;border:1px solid #1e293b;color:#38bdf8;border-radius:12px;padding:15px;resize:vertical;line-height:1.5}
.footer{text-align:center;color:#64748b;margin-top:25px;font-size:14px}
</style>
</head>

<body>

<div class="container">

    <div class="title">CSS Filter Generator</div>
    <div class="desc">Generate CSS filter effects with live preview and copyable CSS code.</div>

    <div class="card">

        <div class="grid">

            <div>
                <div class="control">
                    <label>Blur</label>
                    <input type="range" id="blur" min="0" max="20" value="0">
                    <div class="value" id="blurVal">0px</div>
                </div>

                <div class="control">
                    <label>Brightness</label>
                    <input type="range" id="brightness" min="0" max="200" value="100">
                    <div class="value" id="brightnessVal">100%</div>
                </div>

                <div class="control">
                    <label>Contrast</label>
                    <input type="range" id="contrast" min="0" max="200" value="100">
                    <div class="value" id="contrastVal">100%</div>
                </div>

                <div class="control">
                    <label>Saturate</label>
                    <input type="range" id="saturate" min="0" max="300" value="100">
                    <div class="value" id="saturateVal">100%</div>
                </div>

                <div class="control">
                    <label>Grayscale</label>
                    <input type="range" id="grayscale" min="0" max="100" value="0">
                    <div class="value" id="grayscaleVal">0%</div>
                </div>

                <div class="control">
                    <label>Hue Rotate</label>
                    <input type="range" id="hue" min="0" max="360" value="0">
                    <div class="value" id="hueVal">0deg</div>
                </div>
            </div>

            <div class="preview">
                <div class="preview-box" id="previewBox">Toolivo</div>
            </div>

        </div>

        <div class="buttons">
            <button class="generate" onclick="generateFilter()">Generate</button>
            <button class="copy" onclick="copyCSS()">Copy CSS</button>
            <button class="reset" onclick="resetFilter()">Reset</button>
        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">Toolivo © 2026</div>

</div>

<script>
function generateFilter(){
    const blur = document.getElementById("blur").value;
    const brightness = document.getElementById("brightness").value;
    const contrast = document.getElementById("contrast").value;
    const saturate = document.getElementById("saturate").value;
    const grayscale = document.getElementById("grayscale").value;
    const hue = document.getElementById("hue").value;

    document.getElementById("blurVal").innerText = blur + "px";
    document.getElementById("brightnessVal").innerText = brightness + "%";
    document.getElementById("contrastVal").innerText = contrast + "%";
    document.getElementById("saturateVal").innerText = saturate + "%";
    document.getElementById("grayscaleVal").innerText = grayscale + "%";
    document.getElementById("hueVal").innerText = hue + "deg";

    const filter = `blur(${blur}px) brightness(${brightness}%) contrast(${contrast}%) saturate(${saturate}%) grayscale(${grayscale}%) hue-rotate(${hue}deg)`;

    document.getElementById("previewBox").style.filter = filter;

    document.getElementById("output").value =
`.filtered-element{
    filter:${filter};
}`;
}

function copyCSS(){
    navigator.clipboard.writeText(document.getElementById("output").value);
    alert("Copied!");
}

function resetFilter(){
    document.getElementById("blur").value = 0;
    document.getElementById("brightness").value = 100;
    document.getElementById("contrast").value = 100;
    document.getElementById("saturate").value = 100;
    document.getElementById("grayscale").value = 0;
    document.getElementById("hue").value = 0;
    generateFilter();
}

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", generateFilter);
});

generateFilter();
</script>

</body>
</html>
