<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robots.txt Generator - Toolivo</title>
<meta name="description" content="Generate robots.txt files instantly with sitemap URL, crawl delay, allow and disallow rules.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;padding:20px}
.container{max-width:950px;margin:auto}
.title{font-size:32px;font-weight:bold;margin-bottom:10px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{color:#94a3b8;margin-bottom:30px;line-height:1.6}
.card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.input-group{display:flex;flex-direction:column}
.input-group label{margin-bottom:8px;color:#cbd5e1;font-size:14px}
.input-group input,.input-group select,.input-group textarea{
    background:#020617;border:1px solid #1e293b;color:white;
    padding:14px;border-radius:12px;outline:none;
}
textarea{resize:vertical;min-height:100px}
.buttons{display:flex;gap:15px;margin-top:20px;flex-wrap:wrap}
button{
    padding:14px 20px;border:none;border-radius:12px;
    cursor:pointer;font-weight:bold;transition:.2s;
}
.generate{background:linear-gradient(90deg,#06b6d4,#3b82f6);color:white}
.copy{background:#1e293b;color:white}
button:hover{opacity:.9;transform:translateY(-2px)}
.output{
    width:100%;height:350px;background:#020617;border:1px solid #1e293b;
    color:#38bdf8;border-radius:12px;padding:15px;resize:vertical;line-height:1.5;
}
.footer{text-align:center;color:#64748b;margin-top:30px;font-size:14px}
</style>
</head>

<body>

<div class="container">

    <div class="title">Robots.txt Generator</div>

    <div class="desc">
        Generate a robots.txt file for your website. Add sitemap URL, crawl delay,
        allow rules, disallow rules and custom bot instructions.
    </div>

    <div class="card">

        <div class="grid">

            <div class="input-group">
                <label>Bot Rule</label>
                <select id="botRule">
                    <option value="allow">Allow all bots</option>
                    <option value="block">Block all bots</option>
                    <option value="custom">Custom user-agent</option>
                </select>
            </div>

            <div class="input-group">
                <label>Custom User-Agent</label>
                <input type="text" id="customAgent" placeholder="Googlebot">
            </div>

            <div class="input-group">
                <label>Sitemap URL</label>
                <input type="text" id="sitemapUrl" placeholder="https://toolivo.site/sitemap.xml">
            </div>

            <div class="input-group">
                <label>Crawl Delay</label>
                <input type="number" id="crawlDelay" placeholder="10">
            </div>

            <div class="input-group">
                <label>Disallow Paths</label>
                <textarea id="disallowPaths" placeholder="/admin&#10;/private&#10;/test"></textarea>
            </div>

            <div class="input-group">
                <label>Allow Paths</label>
                <textarea id="allowPaths" placeholder="/&#10;/tools"></textarea>
            </div>

        </div>

        <div class="input-group" style="margin-top:15px;">
            <label>Custom Rules</label>
            <textarea id="customRules" placeholder="Add extra robots.txt rules here..."></textarea>
        </div>

        <div class="buttons">
            <button class="generate" onclick="generateRobots()">Generate</button>
            <button class="copy" onclick="copyRobots()">Copy</button>
        </div>

    </div>

    <div class="card">
        <textarea class="output" id="output" placeholder="Generated robots.txt will appear here..."></textarea>
    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateRobots(){

    const botRule = document.getElementById("botRule").value;
    const customAgent = document.getElementById("customAgent").value.trim();
    const sitemapUrl = document.getElementById("sitemapUrl").value.trim();
    const crawlDelay = document.getElementById("crawlDelay").value.trim();
    const disallowPaths = document.getElementById("disallowPaths").value.trim();
    const allowPaths = document.getElementById("allowPaths").value.trim();
    const customRules = document.getElementById("customRules").value.trim();

    let code = "";

    if(botRule === "allow"){
        code += "User-agent: *\n";
        code += "Allow: /\n";
    }

    if(botRule === "block"){
        code += "User-agent: *\n";
        code += "Disallow: /\n";
    }

    if(botRule === "custom"){
        code += "User-agent: " + (customAgent || "*") + "\n";
    }

    if(disallowPaths){
        disallowPaths.split("\n").forEach(path => {
            if(path.trim()){
                code += "Disallow: " + path.trim() + "\n";
            }
        });
    }

    if(allowPaths){
        allowPaths.split("\n").forEach(path => {
            if(path.trim()){
                code += "Allow: " + path.trim() + "\n";
            }
        });
    }

    if(crawlDelay){
        code += "Crawl-delay: " + crawlDelay + "\n";
    }

    if(sitemapUrl){
        code += "\nSitemap: " + sitemapUrl + "\n";
    }

    if(customRules){
        code += "\n" + customRules + "\n";
    }

    document.getElementById("output").value = code.trim();
}

function copyRobots(){

    const output = document.getElementById("output");

    if(!output.value){
        alert("Generate robots.txt first.");
        return;
    }

    navigator.clipboard.writeText(output.value);
    alert("Copied!");
}
</script>

</body>
</html>
