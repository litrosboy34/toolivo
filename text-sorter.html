<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

a{
text-decoration:none;
color:inherit;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
padding:6px 0;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:0;
font-size:34px;
font-weight:bold;
}

.logo img{
width:115px;
height:115px;
object-fit:contain;
filter:drop-shadow(0 0 34px rgba(57,230,210,.55))
drop-shadow(0 20px 46px rgba(0,0,0,.62));
transform:translateY(4px);
}

.logo span{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav{
display:flex;
align-items:center;
gap:14px;
flex-wrap:wrap;
}

.nav a{
color:#94a3b8;
font-size:14px;
transition:.2s;
}

.nav a:hover{
color:white;
}

.tool-hero{
padding:45px 0 28px;
}

.tool-hero h1{
font-size:clamp(42px,7vw,64px);
line-height:1.05;
margin-bottom:14px;
}

.tool-hero p{
max-width:760px;
color:#94a3b8;
line-height:1.7;
font-size:18px;
}

.gradient{
background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tool-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:20px;
}

.panel{
background:#111827;
border:1px solid #1e293b;
border-radius:18px;
padding:20px;
}

textarea{
width:100%;
height:320px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:18px;
padding:18px;
resize:vertical;
line-height:1.6;
font-size:14px;
outline:none;
font-family:monospace;
}

textarea:focus{
border-color:#38bdf8;
}

.buttons{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

button{
padding:15px 20px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
font-size:15px;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.primary{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
}

.secondary{
background:#020617;
border:1px solid #334155;
color:#cbd5e1;
}

.info{
padding:16px;
border:1px solid #334155;
border-radius:16px;
background:#020617;
color:#94a3b8;
line-height:1.6;
margin-bottom:14px;
}

.footer{
margin-top:55px;
padding:30px 0;
border-top:1px solid #1e293b;
color:#64748b;
text-align:center;
}

.footer-links{
display:flex;
gap:16px;
justify-content:center;
flex-wrap:wrap;
margin-top:12px;
}

.footer-links a:hover{
color:white;
}

@media(max-width:900px){

.tool-grid{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
}

.logo img{
width:95px;
height:95px;
}

}

<body>

<div class="container">

<header class="header">

<a href="/" class="logo">
<img src="https://i.imgur.com/7qzyyTa.png" alt="Toolivo">
<span>Toolivo</span>
</a>

<nav class="nav">
<a href="/">Home</a>
<a href="/tools.html">Tools</a>
<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/contact.html">Contact</a>
</nav>

</header>

<section class="tool-hero">

<h1>Text <span class="gradient">Sorter</span></h1>

<p>
Sort text lines alphabetically instantly for organization and cleanup.
</p>

</section>

<section class="tool-grid">

<div class="panel">

<textarea
id="input"
placeholder="Paste text lines here..."
></textarea>

<div class="buttons">

<button class="primary" onclick="sortTextAZ()">
Sort A-Z
</button>

<button class="secondary" onclick="sortTextZA()">
Sort Z-A
</button>

<button class="secondary" onclick="copyOutput()">
Copy
</button>

</div>

</div>

<div class="panel">

<div class="info">
Useful for keyword lists, emails, logs and content organization.
</div>

<textarea
id="output"
placeholder="Sorted text will appear here..."
readonly
></textarea>

</div>

</section>

<footer class="footer">

<div>
© <span id="year"></span> Toolivo. All rights reserved.
</div>

<div class="footer-links">
<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/terms.html">Terms</a>
<a href="/contact.html">Contact</a>
<a href="/sitemap.xml">Sitemap</a>
</div>

</footer>

</div>

<script>

function sortTextAZ(){

const input =
document.getElementById("input")
.value
.trim();

if(!input){
alert("Please enter text.");
return;
}

const sorted =
input
.split("\n")
.sort((a,b)=>a.localeCompare(b))
.join("\n");

document.getElementById("output").value =
sorted;
}

function sortTextZA(){

const input =
document.getElementById("input")
.value
.trim();

if(!input){
alert("Please enter text.");
return;
}

const sorted =
input
.split("\n")
.sort((a,b)=>b.localeCompare(a))
.join("\n");

document.getElementById("output").value =
sorted;
}

function copyOutput(){

const output =
document.getElementById("output");

if(!output.value){
alert("Nothing to copy.");
return;
}

navigator.clipboard.writeText(output.value);

alert("Copied!");
}

document.getElementById("year").innerText =
new Date().getFullYear();

</script>

    ["meta-tag-generator.html","Meta Tag Generator","Generate SEO meta tags."],

  const current = location.pathname.split("/").pop();
