<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aspect Ratio Calculator - Toolivo</title>
<meta name="description" content="Calculate aspect ratios instantly with live preview and common ratio detection.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:950px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:800px){
    .grid{
        grid-template-columns:1fr;
    }
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input{
    width:100%;
    background:#020617;
    border:1px solid #334155;
    color:white;
    border-radius:12px;
    padding:14px;
    outline:none;
    margin-bottom:18px;
}

.result{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:20px;
    margin-top:20px;
}

.result h3{
    color:#38bdf8;
    margin-bottom:15px;
}

.result p{
    margin-bottom:10px;
    color:#cbd5e1;
}

.preview{
    min-height:320px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.preview-box{
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
    border-radius:16px;
    transition:0.2s;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Aspect Ratio Calculator</div>

    <div class="desc">
        Calculate aspect ratios instantly with common ratio detection and live preview.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <label>Width</label>
                <input type="number" id="width" value="1920">

                <label>Height</label>
                <input type="number" id="height" value="1080">

                <div class="buttons">
                    <button class="generate" onclick="calculateRatio()">
                        Calculate
                    </button>

                    <button class="copy" onclick="copyRatio()">
                        Copy Ratio
                    </button>
                </div>

                <div class="result">

                    <h3>Result</h3>

                    <p id="ratioText">Aspect Ratio: 16:9</p>

                    <p id="decimalText">Decimal Ratio: 1.78</p>

                    <p id="commonText">Common Ratio: Widescreen (16:9)</p>

                </div>

            </div>

            <div>

                <div class="preview">

                    <div class="preview-box" id="previewBox"></div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function gcd(a,b){
    return b === 0 ? a : gcd(b, a % b);
}

function getCommonRatio(ratio){

    const ratios = {
        "16:9":"Widescreen",
        "4:3":"Standard",
        "1:1":"Square",
        "21:9":"Ultrawide",
        "3:2":"Photography",
        "9:16":"Vertical Video"
    };

    return ratios[ratio] || "Custom Ratio";
}

function calculateRatio(){

    const width =
    parseInt(document.getElementById("width").value);

    const height =
    parseInt(document.getElementById("height").value);

    if(!width || !height){
        return;
    }

    const divisor = gcd(width,height);

    const ratioWidth = width / divisor;
    const ratioHeight = height / divisor;

    const ratio =
    ratioWidth + ":" + ratioHeight;

    const decimal =
    (width / height).toFixed(2);

    const common =
    getCommonRatio(ratio);

    document.getElementById("ratioText").innerText =
    "Aspect Ratio: " + ratio;

    document.getElementById("decimalText").innerText =
    "Decimal Ratio: " + decimal;

    document.getElementById("commonText").innerText =
    "Common Ratio: " + common + " (" + ratio + ")";

    const preview =
    document.getElementById("previewBox");

    let maxWidth = 320;

    let calculatedHeight =
    (height / width) * maxWidth;

    preview.style.width =
    maxWidth + "px";

    preview.style.height =
    calculatedHeight + "px";
}

function copyRatio(){

    const text =
    document.getElementById("ratioText").innerText;

    navigator.clipboard.writeText(text);

    alert("Copied!");
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", calculateRatio);
});

calculateRatio();
</script>

</body>
</html>
