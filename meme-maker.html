<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Meme Maker — Toolivo</title>

<meta name="description" content="Create advanced memes online with draggable text, stickers, emojis and templates using Toolivo.">

<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:
radial-gradient(circle at top left,#0d3f35 0%,transparent 30%),
radial-gradient(circle at top right,#1b2557 0%,transparent 30%),
#05070d;
color:white;
min-height:100vh;
overflow-x:hidden;
}

.container{
width:min(1200px,calc(100% - 32px));
margin:auto;
}

header{
padding:28px 0;
}

.logo{
font-size:34px;
font-weight:900;
letter-spacing:-2px;
}

.logo span{
background:linear-gradient(90deg,#39e6d2,#7aa2ff);
-webkit-background-clip:text;
color:transparent;
}

.hero{
padding:50px 0 26px;
text-align:center;
}

.hero h1{
font-size:72px;
line-height:0.95;
letter-spacing:-4px;
margin:0 0 18px;
}

.hero h1 span{
background:linear-gradient(90deg,#fff,#89dfff);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
max-width:760px;
margin:auto;
line-height:1.7;
font-size:18px;
color:#9ca8bb;
}

.tool{
margin-top:40px;
display:grid;
grid-template-columns:0.9fr 1.1fr;
gap:18px;
}

.panel{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:22px;
backdrop-filter:blur(14px);
}

.drop{
border:2px dashed rgba(255,255,255,0.14);
min-height:260px;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.drop:hover{
border-color:#39e6d2;
background:rgba(57,230,210,0.05);
}

.drop h2{
margin:14px 0 10px;
font-size:28px;
}

.drop p{
max-width:320px;
line-height:1.6;
color:#9ca8bb;
}

input[type=file]{
display:none;
}

.input{
width:100%;
height:56px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(0,0,0,0.25);
padding:0 18px;
color:white;
font:inherit;
margin-bottom:14px;
}

.select{
width:100%;
height:56px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
background:#111827;
padding:0 18px;
color:white;
font:inherit;
margin-bottom:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.btn{
height:56px;
border:none;
border-radius:18px;
font-weight:800;
font-size:15px;
cursor:pointer;
background:rgba(255,255,255,0.08);
color:white;
border:1px solid rgba(255,255,255,0.08);
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.12);
}

.primary{
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
color:#051018;
border:none;
}

.preview{
display:none;
margin-top:18px;
border-radius:22px;
overflow:hidden;
background:#111827;
}

.preview canvas{
width:100%;
display:block;
cursor:grab;
}

.info{
margin-top:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
padding:16px;
border-radius:18px;
line-height:1.6;
color:#9ca8bb;
}

footer{
margin-top:70px;
padding:26px 0;
border-top:1px solid rgba(255,255,255,0.08);
text-align:center;
color:#7c8799;
}

@media(max-width:900px){

.tool{
grid-template-columns:1fr;
}

.hero h1{
font-size:52px;
}

}

</style>
</head>
<body>

<div class="container">

<header>
<div class="logo"><span>Toolivo</span></div>
</header>

<section class="hero">

<h1><span>Ultimate Meme</span><br>maker.</h1>

<p>
Create professional memes with draggable text, emoji support, font selection and editable captions.
</p>

</section>

<section class="tool">

<div class="panel">

<label class="drop" for="fileInput">

<div style="font-size:58px">😂</div>

<h2>Drop your image</h2>

<p>
or click to browse from your device.
</p>

</label>

<input type="file" id="fileInput" accept="image/*">

<div class="preview" id="preview">
<canvas id="canvas"></canvas>
</div>

</div>

<div class="panel">

<input class="input" id="memeText" placeholder="Enter meme text...">

<select class="select" id="fontSelect">

<option value="Impact">Impact</option>
<option value="Arial">Arial</option>
<option value="Inter">Inter</option>
<option value="Comic Sans MS">Comic Sans</option>

</select>

<div class="grid">

<button class="btn" id="addEmoji">
😀 Add Emoji
</button>

<button class="btn" id="centerBtn">
Center Text
</button>

</div>

<button class="btn primary" id="downloadBtn">
Download Meme
</button>

<div class="info">
• Drag text with mouse
<br>
• Supports emojis
<br>
• Automatic outline
<br>
• Modern meme editor
</div>

</div>

</section>

<footer>
© 2026 Toolivo — Ultimate Meme Maker
</footer>

</div>

<script>

const fileInput = document.getElementById('fileInput');

const preview = document.getElementById('preview');

const canvas = document.getElementById('canvas');

const ctx = canvas.getContext('2d');

const memeText = document.getElementById('memeText');

const fontSelect = document.getElementById('fontSelect');

let img = null;

let textX = 200;
let textY = 100;

let dragging = false;

function draw(){

if(!img) return;

canvas.width = img.width;
canvas.height = img.height;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(img,0,0);

const fontSize = Math.max(canvas.width / 12,40);

ctx.font = `900 ${fontSize}px ${fontSelect.value}`;

ctx.textAlign = 'center';

ctx.lineWidth = fontSize / 10;

ctx.strokeStyle = 'black';

ctx.fillStyle = 'white';

ctx.lineJoin = 'round';

ctx.strokeText(memeText.value,textX,textY);

ctx.fillText(memeText.value,textX,textY);

}

fileInput.onchange = e => {

const file = e.target.files[0];

if(!file) return;

const url = URL.createObjectURL(file);

img = new Image();

img.onload = () => {

preview.style.display = 'block';

textX = img.width / 2;
textY = 120;

draw();

};

img.src = url;

};

memeText.oninput = draw;

fontSelect.onchange = draw;

document.getElementById('centerBtn').onclick = ()=>{

if(!img) return;

textX = img.width / 2;
textY = img.height / 2;

draw();

};

document.getElementById('addEmoji').onclick = ()=>{

memeText.value += ' 😂';

draw();

};

canvas.addEventListener('mousedown',()=>{

dragging = true;

});

window.addEventListener('mouseup',()=>{

dragging = false;

});

canvas.addEventListener('mousemove',e=>{

if(!dragging || !img) return;

const rect = canvas.getBoundingClientRect();

const scaleX = canvas.width / rect.width;
const scaleY = canvas.height / rect.height;

textX = (e.clientX - rect.left) * scaleX;
textY = (e.clientY - rect.top) * scaleY;

draw();

});

document.getElementById('downloadBtn').onclick = ()=>{

if(!img) return;

const link = document.createElement('a');

link.download = 'toolivo-meme.png';

link.href = canvas.toDataURL('image/png');

link.click();

};

</script>

</body>
</html>
