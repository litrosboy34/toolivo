<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meme Maker — Toolivo</title>

<meta name="description" content="Create memes instantly online with Toolivo. Add top and bottom text to any image for free.">

<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:
radial-gradient(circle at top left,#0d3f35 0%,transparent 30%),
radial-gradient(circle at top right,#1b2557 0%,transparent 30%),
#05070d;
color:white;
min-height:100vh;
overflow-x:hidden;
}

.container{
width:min(1150px,calc(100% - 32px));
margin:auto;
}

header{
padding:28px 0;
}

.logo{
font-size:34px;
font-weight:900;
letter-spacing:-2px;
}

.logo span{
background:linear-gradient(90deg,#39e6d2,#7aa2ff);
-webkit-background-clip:text;
color:transparent;
}

.hero{
padding:60px 0 28px;
text-align:center;
}

.hero h1{
font-size:72px;
line-height:0.95;
letter-spacing:-4px;
margin:0 0 18px;
}

.hero h1 span{
background:linear-gradient(90deg,#fff,#89dfff);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
max-width:760px;
margin:auto;
line-height:1.7;
font-size:18px;
color:#9ca8bb;
}

.tool{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.panel{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:22px;
backdrop-filter:blur(14px);
}

.drop{
border:2px dashed rgba(255,255,255,0.14);
min-height:300px;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.drop:hover{
border-color:#39e6d2;
background:rgba(57,230,210,0.05);
}

.drop h2{
margin:14px 0 10px;
font-size:28px;
}

.drop p{
max-width:320px;
line-height:1.6;
color:#9ca8bb;
}

input[type=file]{
display:none;
}

.input{
width:100%;
height:58px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(0,0,0,0.25);
padding:0 18px;
color:white;
font:inherit;
margin-bottom:14px;
}

.preview{
display:none;
margin-top:18px;
border-radius:22px;
overflow:hidden;
background:#111827;
}

.preview canvas{
width:100%;
display:block;
}

.btn{
margin-top:10px;
height:58px;
border:none;
border-radius:18px;
font-weight:800;
font-size:16px;
cursor:pointer;
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
color:#051018;
transition:0.2s;
width:100%;
}

.btn:hover{
transform:translateY(-2px);
}

.info{
margin-top:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
padding:16px;
border-radius:18px;
line-height:1.6;
color:#9ca8bb;
}

footer{
margin-top:70px;
padding:26px 0;
border-top:1px solid rgba(255,255,255,0.08);
text-align:center;
color:#7c8799;
}

@media(max-width:860px){

.tool{
grid-template-columns:1fr;
}

.hero h1{
font-size:52px;
}

}

</style>
</head>
<body>

<div class="container">

<header>
<div class="logo"><span>Toolivo</span></div>
</header>

<section class="hero">

<h1><span>Meme</span><br>maker.</h1>

<p>
Create memes instantly by adding top and bottom text to any image directly in your browser.
</p>

</section>

<section class="tool">

<div class="panel">

<label class="drop" for="fileInput">

<div style="font-size:58px">😂</div>

<h2>Drop your image</h2>

<p>
or click to browse from your device.
</p>

</label>

<input type="file" id="fileInput" accept="image/*">

<div class="preview" id="preview">
<canvas id="canvas"></canvas>
</div>

</div>

<div class="panel">

<input 
class="input"
id="topText"
placeholder="Top text..."
>

<input 
class="input"
id="bottomText"
placeholder="Bottom text..."
>

<button class="btn" id="downloadBtn">
Download Meme
</button>

<div class="info">
Classic meme style with automatic bold white text and black outline.
</div>

</div>

</section>

<footer>
© 2026 Toolivo — Meme Maker
</footer>

</div>

<script>

const fileInput = document.getElementById('fileInput');

const preview = document.getElementById('preview');

const canvas = document.getElementById('canvas');

const ctx = canvas.getContext('2d');

const topText = document.getElementById('topText');

const bottomText = document.getElementById('bottomText');

let img = null;

function drawMeme(){

if(!img) return;

canvas.width = img.width;
canvas.height = img.height;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(img,0,0);

const fontSize = Math.max(canvas.width / 10,40);

ctx.font = `900 ${fontSize}px Impact`;

ctx.fillStyle = 'white';

ctx.strokeStyle = 'black';

ctx.lineWidth = fontSize / 12;

ctx.textAlign = 'center';

ctx.lineJoin = 'round';

const top = topText.value.toUpperCase();

const bottom = bottomText.value.toUpperCase();

ctx.strokeText(top,canvas.width/2,fontSize + 20);
ctx.fillText(top,canvas.width/2,fontSize + 20);

ctx.strokeText(bottom,canvas.width/2,canvas.height - 30);
ctx.fillText(bottom,canvas.width/2,canvas.height - 30);

}

fileInput.onchange = e => {

const file = e.target.files[0];

if(!file) return;

const url = URL.createObjectURL(file);

img = new Image();

img.onload = () => {

preview.style.display = 'block';

drawMeme();

};

img.src = url;

};

topText.oninput = drawMeme;

bottomText.oninput = drawMeme;

document.getElementById('downloadBtn').onclick = ()=>{

if(!img) return;

const link = document.createElement('a');

link.download = 'toolivo-meme.png';

link.href = canvas.toDataURL('image/png');

link.click();

};

</script>

</body>
</html>
