<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Previewer — Toolivo</title>
<meta name="description" content="Write Markdown and preview it live instantly with Toolivo.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#05070d;
color:white;
}

.wrap{
width:min(1200px,calc(100% - 28px));
margin:auto;
padding:40px 0;
}

h1{
font-size:56px;
margin:20px 0 10px;
}

p{
color:#9ca8bb;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.panel{
background:#0b1020;
border:1px solid #263244;
border-radius:20px;
padding:18px;
}

.label{
font-size:14px;
font-weight:bold;
color:#9ca8bb;
margin-bottom:10px;
}

textarea{
width:100%;
min-height:500px;
border-radius:18px;
border:1px solid #263244;
background:#05070d;
color:white;
padding:18px;
font-size:15px;
line-height:1.7;
box-sizing:border-box;
resize:vertical;
font-family:monospace;
}

.preview{
min-height:500px;
border-radius:18px;
border:1px solid #263244;
background:#05070d;
padding:22px;
line-height:1.8;
overflow:auto;
}

.preview h1,
.preview h2,
.preview h3{
margin-top:24px;
}

.preview code{
background:#121935;
padding:3px 7px;
border-radius:6px;
font-family:monospace;
}

.preview pre{
background:#121935;
padding:16px;
border-radius:14px;
overflow:auto;
}

.preview blockquote{
border-left:4px solid #39e6d2;
padding-left:14px;
margin-left:0;
color:#9ca8bb;
}

.preview a{
color:#39e6d2;
}

button{
padding:15px 20px;
border:0;
border-radius:16px;
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
font-weight:800;
cursor:pointer;
margin-top:12px;
}

.copy{
background:#121935;
color:white;
border:1px solid #263244;
margin-left:8px;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

h1{
font-size:42px;
}

}
</style>
</head>
<body>

<div class="wrap">

<h1>Markdown Previewer</h1>

<p>
Write Markdown on the left and preview it live on the right.
</p>

<div class="grid">

<div class="panel">

<div class="label">Markdown Input</div>

<textarea id="input">
# Toolivo Markdown Previewer

## Live preview

- Fast
- Clean
- Responsive

**Bold text**

*Italic text*

> This is a quote.

\`\`\`
console.log("Toolivo");
\`\`\`

[Visit Toolivo](https://toolivo.site)
</textarea>

<button onclick="copyMarkdown()">Copy Markdown</button>

</div>

<div class="panel">

<div class="label">Preview</div>

<div class="preview" id="preview"></div>

</div>

</div>

</div>

<script>
const input=document.getElementById('input');
const preview=document.getElementById('preview');

function parseMarkdown(md){

let html=md;

html=html.replace(/^### (.*$)/gim,'<h3>$1</h3>');
html=html.replace(/^## (.*$)/gim,'<h2>$1</h2>');
html=html.replace(/^# (.*$)/gim,'<h1>$1</h1>');

html=html.replace(/\*\*(.*?)\*\*/gim,'<strong>$1</strong>');
html=html.replace(/\*(.*?)\*/gim,'<em>$1</em>');

html=html.replace(/^\> (.*$)/gim,'<blockquote>$1</blockquote>');

html=html.replace(/^\- (.*$)/gim,'<li>$1</li>');
html=html.replace(/(<li>.*<\/li>)/gims,'<ul>$1</ul>');

html=html.replace(/\`(.*?)\`/gim,'<code>$1</code>');

html=html.replace(/\`\`\`([\s\S]*?)\`\`\`/gim,'<pre><code>$1</code></pre>');

html=html.replace(/\[(.*?)\]\((.*?)\)/gim,'<a href="$2" target="_blank">$1</a>');

html=html.replace(/\n$/gim,'<br>');

return html;
}

function updatePreview(){
preview.innerHTML=parseMarkdown(input.value);
}

function copyMarkdown(){
navigator.clipboard.writeText(input.value);
}

input.addEventListener('input',updatePreview);

updatePreview();
</script>

</body>
</html>
