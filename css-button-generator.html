<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Button Generator - Toolivo</title>

<meta name="description" content="Generate beautiful CSS buttons instantly with live preview and copyable code.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:800px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input[type="text"],
input[type="number"]{
    width:100%;
    background:#020617;
    border:1px solid #334155;
    color:white;
    border-radius:12px;
    padding:14px;
    outline:none;
}

input[type="color"]{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    background:none;
    cursor:pointer;
}

input[type="range"]{
    width:100%;
    accent-color:#0ea5e9;
}

.preview-area{
    min-height:320px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:16px;
}

.preview-button{
    border:none;
    cursor:pointer;
    transition:0.2s;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button.action{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

textarea{
    width:100%;
    height:220px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">CSS Button Generator</div>

    <div class="desc">
        Generate beautiful CSS buttons instantly with live preview and copyable CSS code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Button Text</label>
                    <input type="text" id="text" value="Toolivo Button">
                </div>

                <div class="control">
                    <label>Background Color</label>
                    <input type="color" id="bg" value="#06b6d4">
                </div>

                <div class="control">
                    <label>Text Color</label>
                    <input type="color" id="color" value="#ffffff">
                </div>

                <div class="control">
                    <label>Border Radius</label>
                    <input type="range" id="radius" min="0" max="60" value="14">
                </div>

                <div class="control">
                    <label>Padding Y</label>
                    <input type="range" id="paddingY" min="5" max="40" value="14">
                </div>

                <div class="control">
                    <label>Padding X</label>
                    <input type="range" id="paddingX" min="10" max="60" value="24">
                </div>

                <div class="control">
                    <label>Font Size</label>
                    <input type="range" id="fontSize" min="10" max="40" value="16">
                </div>

            </div>

            <div class="preview-area">

                <button class="preview-button" id="previewBtn">
                    Toolivo Button
                </button>

            </div>

        </div>

        <div class="buttons">

            <button class="action generate" onclick="generateButton()">
                Generate
            </button>

            <button class="action copy" onclick="copyCSS()">
                Copy CSS
            </button>

        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateButton(){

    const text = document.getElementById("text").value;
    const bg = document.getElementById("bg").value;
    const color = document.getElementById("color").value;
    const radius = document.getElementById("radius").value;
    const paddingY = document.getElementById("paddingY").value;
    const paddingX = document.getElementById("paddingX").value;
    const fontSize = document.getElementById("fontSize").value;

    const btn = document.getElementById("previewBtn");

    btn.innerText = text;

    btn.style.background = bg;
    btn.style.color = color;
    btn.style.borderRadius = radius + "px";
    btn.style.padding = paddingY + "px " + paddingX + "px";
    btn.style.fontSize = fontSize + "px";

    const css =
`.custom-button{
    background:${bg};
    color:${color};
    border:none;
    border-radius:${radius}px;
    padding:${paddingY}px ${paddingX}px;
    font-size:${fontSize}px;
    cursor:pointer;
}`;

    document.getElementById("output").value = css;
}

function copyCSS(){

    const output = document.getElementById("output");

    navigator.clipboard.writeText(output.value);

    alert("Copied!");
}

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", generateButton);
});

generateButton();
</script>

</body>
</html>
