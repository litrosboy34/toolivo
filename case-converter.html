<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Toolivo</title>
<meta name="description" content="Convert text to uppercase, lowercase, title case, camelCase and more instantly with Toolivo.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#05070d;
color:white;
}

.wrap{
width:min(1100px,calc(100% - 28px));
margin:auto;
padding:40px 0;
}

h1{
font-size:58px;
margin:20px 0 10px;
}

p{
color:#9ca8bb;
margin-bottom:25px;
}

textarea{
width:100%;
min-height:260px;
border-radius:20px;
border:1px solid #263244;
background:#0b1020;
color:white;
padding:18px;
font-size:17px;
line-height:1.6;
box-sizing:border-box;
resize:vertical;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:18px;
}

button{
padding:15px;
border:0;
border-radius:16px;
background:#0b1020;
border:1px solid #263244;
color:white;
font-weight:800;
cursor:pointer;
transition:.2s;
font-size:15px;
}

button:hover{
transform:translateY(-2px);
background:#121935;
}

.primary{
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
color:#031017;
border:0;
}

.output{
margin-top:20px;
background:#0b1020;
border:1px solid #263244;
border-radius:20px;
padding:18px;
white-space:pre-wrap;
line-height:1.7;
font-size:17px;
min-height:180px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:14px;
}

.copyBtn{
width:auto;
padding:12px 16px;
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr 1fr;
}
h1{
font-size:42px;
}
}

@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="wrap">

<h1>Case Converter</h1>

<p>
Convert text instantly to uppercase, lowercase, title case, camelCase, snake_case and more.
</p>

<textarea id="input" placeholder="Paste or type your text here..."></textarea>

<div class="grid">
<button onclick="convert('upper')">UPPERCASE</button>
<button onclick="convert('lower')">lowercase</button>
<button onclick="convert('title')">Title Case</button>

<button onclick="convert('sentence')">Sentence case</button>
<button onclick="convert('camel')">camelCase</button>
<button onclick="convert('snake')">snake_case</button>

<button onclick="convert('kebab')">kebab-case</button>
<button onclick="convert('alternating')">aLtErNaTiNg</button>
<button class="primary" onclick="clearAll()">Clear</button>
</div>

<div class="output" id="output"></div>

<div class="topbar">
<div style="color:#9ca8bb;font-size:14px">
Characters: <span id="count">0</span>
</div>

<button class="copyBtn" onclick="copyText()">Copy Text</button>
</div>

</div>

<script>
const input=document.getElementById('input');
const output=document.getElementById('output');
const count=document.getElementById('count');

input.addEventListener('input',()=>{
output.textContent=input.value;
updateCount();
});

function updateCount(){
count.textContent=output.textContent.length;
}

function titleCase(str){
return str.toLowerCase().split(' ').map(word=>{
return word.charAt(0).toUpperCase()+word.slice(1);
}).join(' ');
}

function sentenceCase(str){
return str.charAt(0).toUpperCase()+str.slice(1).toLowerCase();
}

function camelCase(str){
return str.toLowerCase().split(/[\s_-]+/).map((word,i)=>{
if(i===0) return word;
return word.charAt(0).toUpperCase()+word.slice(1);
}).join('');
}

function snakeCase(str){
return str.toLowerCase().trim().replace(/\s+/g,'_');
}

function kebabCase(str){
return str.toLowerCase().trim().replace(/\s+/g,'-');
}

function alternatingCase(str){
let result='';
for(let i=0;i<str.length;i++){
result+=i%2===0?str[i].toLowerCase():str[i].toUpperCase();
}
return result;
}

function convert(type){
const text=input.value;

let result=text;

switch(type){

case 'upper':
result=text.toUpperCase();
break;

case 'lower':
result=text.toLowerCase();
break;

case 'title':
result=titleCase(text);
break;

case 'sentence':
result=sentenceCase(text);
break;

case 'camel':
result=camelCase(text);
break;

case 'snake':
result=snakeCase(text);
break;

case 'kebab':
result=kebabCase(text);
break;

case 'alternating':
result=alternatingCase(text);
break;

}

output.textContent=result;
updateCount();
}

function copyText(){
navigator.clipboard.writeText(output.textContent);
}

function clearAll(){
input.value='';
output.textContent='';
updateCount();
}
</script>

</body>
</html>
