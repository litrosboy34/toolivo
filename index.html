const grid = document.getElementById("toolsGrid");
const searchInput = document.getElementById("searchInput");
const buttons = document.querySelectorAll(".cat-btn");
const langBtn = document.getElementById("langBtn");
let activeCategory = "all";

function applyLang(){
const t = translations[lang];
document.documentElement.lang = lang;
document.querySelectorAll("[data-i18n]").forEach(el=>{
const key = el.dataset.i18n;
if(t[key]) el.innerHTML = t[key];
});
document.getElementById("heroTitle").innerHTML = t.heroTitle;
searchInput.placeholder = t.search;
langBtn.innerText = lang === "tr" ? "EN" : "TR";
document.title = lang === "tr" ? "Toolivo - Ücretsiz Online Araçlar" : "Toolivo - Free Online Tools";
renderTools();
}

function renderTools(){
const query = searchInput.value.toLowerCase().trim();
grid.innerHTML = "";

const filtered = tools.filter(tool => {
const matchesCategory = activeCategory === "all" || tool.cat === activeCategory;
const matchesSearch = tool.title.toLowerCase().includes(query) || tool.desc.toLowerCase().includes(query);
return matchesCategory && matchesSearch;
});

filtered.forEach(tool => {
const card = document.createElement("a");
card.className = "tool-card";
card.href = tool.url;
card.innerHTML = `
<div class="tool-icon">${tool.icon}</div>
<h3>${tool.title}</h3>
<p>${tool.desc}</p>
<span class="tool-tag">${tool.cat.toUpperCase()} →</span>
`;
grid.appendChild(card);
});

if(filtered.length === 0){
grid.innerHTML = `<p style="color:#94a3b8;">${translations[lang].notFound}</p>`;
}
}

buttons.forEach(btn => {
btn.addEventListener("click", () => {
buttons.forEach(b => b.classList.remove("active"));
btn.classList.add("active");
activeCategory = btn.dataset.category;
renderTools();
});
});

langBtn.addEventListener("click", () => {
lang = lang === "tr" ? "en" : "tr";
localStorage.setItem("toolivo_lang", lang);
applyLang();
});

searchInput.addEventListener("input", renderTools);
document.getElementById("year").innerText = new Date().getFullYear();

applyLang();
