const grid =
document.getElementById("toolsGrid");

const searchInput =
document.getElementById("searchInput");

const buttons =
document.querySelectorAll(".cat-btn");

const langBtn =
document.getElementById("langBtn");

let activeCategory = "all";

let lang =
localStorage.getItem("toolivo_lang") ||
((navigator.language || "")
.toLowerCase()
.startsWith("tr")
? "tr"
: "en");

function getTitle(tool){

if(typeof tool.title === "object"){
return tool.title[lang];
}

return tool.title;
}

function getDesc(tool){

if(typeof tool.desc === "object"){
return tool.desc[lang];
}

return tool.desc;
}

function applyLanguage(){

if(lang === "tr"){

document.getElementById("badge")
.innerText =
"Hızlı • Ücretsiz • Mobil Uyumlu";

document.getElementById("heroTitle")
.innerHTML =
'Ücretsiz Online <span class="gradient">Araçlar</span>';

"Araçlar";

document.getElementById("navContact")
.innerText =
"İletişim";

document.getElementById("rightsText")
.innerText =
"Tüm hakları saklıdır.";

langBtn.innerText = "EN";

}else{

document.getElementById("badge")
.innerText =
"Fast • Free • Mobile Friendly";

document.getElementById("heroTitle")
.innerHTML =
'Free Online <span class="gradient">Tools</span>';

document.getElementById("heroText")
.innerText =
"Toolivo offers simple and fast tools for images, text, SEO, CSS, developers and converters.";

document.getElementById("searchInput")
.placeholder =
"Search tools...";

document.querySelector(".section-title")
.innerText =
"All Tools";

document.getElementById("navTools")
.innerText =
"Tools";

document.getElementById("navAbout")
.innerText =
"About";

document.getElementById("navPrivacy")
.innerText =
"Privacy";

document.getElementById("navContact")
.innerText =
"Contact";

document.getElementById("rightsText")
.innerText =
"All rights reserved.";

langBtn.innerText = "TR";
}

renderTools();
}

function renderTools(){

const query =
searchInput.value.toLowerCase().trim();

grid.innerHTML = "";

const filtered =
tools.filter(tool => {

const title =
getTitle(tool);

const desc =
getDesc(tool);

const matchesCategory =
activeCategory === "all" ||
tool.cat === activeCategory;

const matchesSearch =
title.toLowerCase().includes(query) ||
desc.toLowerCase().includes(query);

return matchesCategory && matchesSearch;
});

filtered.forEach(tool => {

const card =
document.createElement("a");

card.className =
"tool-card";

card.href =
tool.url;

card.innerHTML = `
<div class="tool-icon">
${tool.icon}
</div>

<h3>
${getTitle(tool)}
</h3>

<p>
${getDesc(tool)}
</p>

<span class="tool-tag">
${tool.cat.toUpperCase()} →
</span>
`;

grid.appendChild(card);
});
}

buttons.forEach(btn => {

btn.addEventListener("click", () => {

buttons.forEach(b =>
b.classList.remove("active")
);

btn.classList.add("active");

activeCategory =
btn.dataset.category;

renderTools();
});
});

searchInput.addEventListener(
"input",
renderTools
);

langBtn.addEventListener("click", () => {

lang =
lang === "tr"
? "en"
: "tr";

localStorage.setItem(
"toolivo_lang",
lang
);

applyLanguage();
});

document.getElementById("year")
.innerText =
new Date().getFullYear();

applyLanguage();

</script>
