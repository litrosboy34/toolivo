<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toolivo - Free Online Tools</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

a{
text-decoration:none;
color:inherit;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
padding:5px 0 15px;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:0px;
font-size:34px;
font-weight:bold;
}

.logo img{
width:120px;
height:120px;
object-fit:contain;
filter:
drop-shadow(0 0 34px rgba(57,230,210,.55))
drop-shadow(0 20px 46px rgba(0,0,0,.62));
}

.logo span{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav{
display:flex;
align-items:center;
gap:14px;
flex-wrap:wrap;
}

.nav a{
color:#94a3b8;
font-size:14px;
}

.nav a:hover{
color:white;
}

.lang-btn{
padding:8px 13px;
border-radius:999px;
border:1px solid #334155;
background:#111827;
color:#cbd5e1;
cursor:pointer;
font-weight:bold;
}

.hero{
text-align:center;
padding:50px 0 40px;
}

.badge{
display:inline-block;
padding:8px 14px;
border:1px solid #1e293b;
border-radius:999px;
color:#38bdf8;
background:#111827;
margin-bottom:18px;
}

.hero h1{
font-size:clamp(42px,7vw,78px);
line-height:1.05;
margin-bottom:18px;
}

.gradient{
background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
max-width:720px;
margin:auto;
color:#94a3b8;
line-height:1.7;
font-size:18px;
}

.search-box{
margin:30px auto 0;
max-width:650px;
}

.search-box input{
width:100%;
padding:17px 20px;
border-radius:16px;
border:1px solid #334155;
background:#020617;
color:white;
outline:none;
font-size:16px;
}

.categories{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin:25px 0 40px;
}

.cat-btn{
padding:11px 16px;
border-radius:999px;
border:1px solid #334155;
background:#111827;
color:#cbd5e1;
cursor:pointer;
font-weight:bold;
}

.cat-btn.active,
.cat-btn:hover{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
border-color:transparent;
}

.section-title{
font-size:30px;
margin:35px 0 18px;
}

.tools-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}

.tool-card{
background:#111827;
border:1px solid #1e293b;
border-radius:18px;
padding:18px;
transition:.2s;
min-height:150px;
display:block;
}

.tool-card:hover{
transform:translateY(-4px);
border-color:#38bdf8;
box-shadow:0 0 35px rgba(56,189,248,.08);
}

.tool-icon{
font-size:28px;
margin-bottom:12px;
}

.tool-card h3{
font-size:18px;
margin-bottom:8px;
}

.tool-card p{
color:#94a3b8;
font-size:14px;
line-height:1.5;
}

.tool-tag{
display:inline-block;
margin-top:12px;
font-size:12px;
color:#38bdf8;
font-weight:bold;
}

.footer{
margin-top:55px;
padding:30px 0;
border-top:1px solid #1e293b;
color:#64748b;
text-align:center;
}

@media(max-width:1000px){

.tools-grid{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:750px){

.tools-grid{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
}

.logo img{
width:100px;
height:100px;
}
}

</style>
</head>

<body>

<div class="container">

<header class="header">

<a class="logo" href="/">
<img src="https://i.imgur.com/7qzyyTa.png">

<span>Toolivo</span>
</a>

<nav class="nav">

<a href="#">Tools</a>
<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/contact.html">Contact</a>

<button class="lang-btn" id="langBtn">
TR
</button>

</nav>

</header>

<section class="hero">

<div class="badge" id="badge">
Fast • Free • Mobile Friendly
</div>

<h1 id="heroTitle">
Free Online <span class="gradient">Tools</span>
</h1>

<p id="heroText">
Toolivo offers simple and fast tools for images, text, SEO, CSS, developers and converters.
</p>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search tools..."
>

</div>

</section>

<div class="categories">

<button class="cat-btn active" data-category="all">
All
</button>

<button class="cat-btn" data-category="image">
Image
</button>

<button class="cat-btn" data-category="developer">
Developer
</button>

<button class="cat-btn" data-category="css">
CSS
</button>

<button class="cat-btn" data-category="seo">
SEO
</button>

</div>

<h2 class="section-title">
All Tools
</h2>

<div class="tools-grid" id="toolsGrid"></div>

<footer class="footer">
© 2026 Toolivo
</footer>

</div>

<script>

let lang = "en";

const tools = [

{
title:{
en:"Background Remover",
tr:"Arka Plan Kaldırıcı"
},

desc:{
en:"Remove image backgrounds online.",
tr:"Görsellerin arka planını kaldırın."
},

url:"/background-remover.html",
cat:"image",
icon:"🖼️"
},

{
title:{
en:"Image Compressor",
tr:"Görsel Sıkıştırıcı"
},

desc:{
en:"Compress images quickly.",
tr:"Görselleri hızlıca sıkıştırın."
},

url:"/image-compressor.html",
cat:"image",
icon:"⚡"
},

{
title:{
en:"Word Counter",
tr:"Kelime Sayacı"
},

desc:{
en:"Count words and characters.",
tr:"Kelime ve karakter sayın."
},

url:"/word-counter.html",
cat:"developer",
icon:"🔤"
},

{
title:{
en:"Password Generator",
tr:"Şifre Oluşturucu"
},

desc:{
en:"Generate secure passwords.",
tr:"Güvenli şifreler oluşturun."
},

url:"/password-generator.html",
cat:"developer",
icon:"🔐"
},

{
title:{
en:"CSS Gradient Generator",
tr:"CSS Gradient Oluşturucu"
},

desc:{
en:"Generate CSS gradients.",
tr:"CSS gradient oluşturun."
},

url:"/css-gradient-generator.html",
cat:"css",
icon:"🌈"
},

{
title:{
en:"Meta Tag Generator",
tr:"Meta Etiket Oluşturucu"
},

desc:{
en:"Generate SEO meta tags.",
tr:"SEO meta etiketleri oluşturun."
},

url:"/meta-tag-generator.html",
cat:"seo",
icon:"🏷️"
}

];

const grid =
document.getElementById("toolsGrid");

const searchInput =
document.getElementById("searchInput");

const buttons =
document.querySelectorAll(".cat-btn");

let activeCategory = "all";

function renderTools(){

const query =
searchInput.value.toLowerCase();

grid.innerHTML = "";

const filtered =
tools.filter(tool => {

const title =
tool.title[lang];

const desc =
tool.desc[lang];

const matchesCategory =
activeCategory === "all" ||
tool.cat === activeCategory;

const matchesSearch =
title.toLowerCase().includes(query) ||
desc.toLowerCase().includes(query);

return matchesCategory && matchesSearch;
});

filtered.forEach(tool => {

const card =
document.createElement("a");

card.className = "tool-card";

card.href = tool.url;

card.innerHTML = `
<div class="tool-icon">
${tool.icon}
</div>

<h3>
${tool.title[lang]}
</h3>

<p>
${tool.desc[lang]}
</p>

<span class="tool-tag">
${tool.cat.toUpperCase()} →
</span>
`;

grid.appendChild(card);
});
}

buttons.forEach(btn => {

btn.addEventListener("click", () => {

buttons.forEach(b =>
b.classList.remove("active")
);

btn.classList.add("active");

activeCategory =
btn.dataset.category;

renderTools();
});
});

searchInput.addEventListener(
"input",
renderTools
);

document.getElementById("langBtn")
.addEventListener("click", () => {

if(lang === "en"){

lang = "tr";

document.getElementById("langBtn")
.innerText = "EN";

document.getElementById("badge")
.innerText =
"Hızlı • Ücretsiz • Mobil Uyumlu";

document.getElementById("heroTitle")
.innerHTML =
'Ücretsiz Online <span class="gradient">Araçlar</span>';

document.getElementById("heroText")
.innerText =
"Toolivo hızlı ve basit online araçlar sunar.";

document.querySelector(".section-title")
.innerText =
"Tüm Araçlar";

searchInput.placeholder =
"Araç ara...";

}else{

lang = "en";

document.getElementById("langBtn")
.innerText = "TR";

document.getElementById("badge")
.innerText =
"Fast • Free • Mobile Friendly";

document.getElementById("heroTitle")
.innerHTML =
'Free Online <span class="gradient">Tools</span>';

document.getElementById("heroText")
.innerText =
"Toolivo offers simple and fast tools for images, text, SEO, CSS, developers and converters.";

document.querySelector(".section-title")
.innerText =
"All Tools";

searchInput.placeholder =
"Search tools...";
}

renderTools();
});

renderTools();

</script>

</body>
</html>
