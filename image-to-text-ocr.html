<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to Text OCR - Toolivo</title>

<meta name="description"
content="Extract text from images online for free using OCR. Fast and mobile friendly.">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:30px;
min-height:100vh;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-size:42px;
margin-bottom:12px;
}

p{
color:#94a3b8;
margin-bottom:30px;
line-height:1.6;
}

.upload-box{
border:2px dashed #334155;
border-radius:20px;
padding:40px;
text-align:center;
background:#111827;
cursor:pointer;
transition:.2s;
}

.upload-box:hover{
border-color:#38bdf8;
}

input{
display:none;
}

.preview{
margin-top:25px;
text-align:center;
}

.preview img{
max-width:100%;
border-radius:16px;
}

button{
margin-top:25px;
padding:14px 22px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.result{
margin-top:35px;
background:#111827;
padding:25px;
border-radius:18px;
border:1px solid #1e293b;
}

textarea{
width:100%;
height:300px;
background:#020617;
color:white;
border:1px solid #334155;
border-radius:14px;
padding:16px;
resize:none;
margin-top:15px;
}

.status{
margin-top:18px;
color:#38bdf8;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Image to Text OCR</h1>

<p>
Extract text from images online using AI OCR technology.
Supports screenshots, documents and photos.
</p>

<label class="upload-box">

<input type="file" id="imageInput" accept="image/*">

<h2>Click to Upload Image</h2>
<p>PNG, JPG, WEBP supported</p>

</label>

<div class="preview" id="preview"></div>

<div style="text-align:center;">

<button id="extractBtn">
Extract Text
</button>

</div>

<div class="status" id="status"></div>

<div class="result">

<h2>Extracted Text</h2>

<textarea id="resultText"
placeholder="OCR result will appear here..."></textarea>

<button id="copyBtn">
Copy Text
</button>

</div>

</div>

<script>

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const extractBtn =
document.getElementById("extractBtn");

const resultText =
document.getElementById("resultText");

const statusText =
document.getElementById("status");

const copyBtn =
document.getElementById("copyBtn");

let uploadedImage = null;

imageInput.addEventListener("change", e => {

const file = e.target.files[0];

if(!file) return;

uploadedImage = file;

const reader = new FileReader();

reader.onload = () => {

preview.innerHTML = `
<img src="${reader.result}">
`;

};

reader.readAsDataURL(file);

});

extractBtn.addEventListener("click", async () => {

if(!uploadedImage){

alert("Please upload an image first.");

return;
}

statusText.innerText =
"Processing OCR...";

resultText.value = "";

const {
data:{text}
} = await Tesseract.recognize(
uploadedImage,
"eng",
{
logger:m => {

if(m.status){

statusText.innerText =
m.status + " " +
Math.floor((m.progress || 0)*100) + "%";
}
}
}
);

resultText.value = text;

statusText.innerText =
"OCR completed.";

});

copyBtn.addEventListener("click", () => {

navigator.clipboard.writeText(
resultText.value
);

copyBtn.innerText = "Copied!";

setTimeout(() => {

copyBtn.innerText = "Copy Text";

},1500);

});

</script>

</body>
</html>
