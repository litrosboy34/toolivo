<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator — Toolivo</title>

<meta name="description" content="Generate QR codes instantly with Toolivo. Free online QR generator for links, text, WiFi and more.">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:
radial-gradient(circle at top left,#0d3f35 0%,transparent 30%),
radial-gradient(circle at top right,#1b2557 0%,transparent 30%),
#05070d;
color:white;
min-height:100vh;
overflow-x:hidden;
}

.container{
width:min(1100px,calc(100% - 32px));
margin:auto;
}

header{
padding:28px 0;
}

.logo{
display:flex;
align-items:center;
gap:0px;
font-size:34px;
font-weight:900;
letter-spacing:-2px;
}

.logo img{
width:110px;
height:110px;
object-fit:contain;
filter:drop-shadow(0 0 30px rgba(57,230,210,.45));
}
.logo span{
background:linear-gradient(90deg,#39e6d2,#7aa2ff);
-webkit-background-clip:text;
color:transparent;
}

.hero{
padding:60px 0 30px;
text-align:center;
}

.hero h1{
font-size:72px;
line-height:0.95;
letter-spacing:-4px;
margin:0 0 18px;
}

.hero h1 span{
background:linear-gradient(90deg,#fff,#89dfff);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
max-width:760px;
margin:auto;
line-height:1.7;
font-size:18px;
color:#9ca8bb;
}

.tool{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.panel{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:22px;
backdrop-filter:blur(14px);
}

.input{
width:100%;
height:58px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(0,0,0,0.25);
padding:0 18px;
color:white;
font:inherit;
margin-bottom:16px;
}

.btn{
height:58px;
border:none;
border-radius:18px;
font-weight:800;
font-size:16px;
cursor:pointer;
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
color:#051018;
transition:0.2s;
width:100%;
}

.btn:hover{
transform:translateY(-2px);
}

.qr-wrap{
display:flex;
align-items:center;
justify-content:center;
min-height:420px;
}

#qrcode{
padding:18px;
border-radius:24px;
background:white;
display:inline-block;
}

.info{
margin-top:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
padding:16px;
border-radius:18px;
line-height:1.6;
color:#9ca8bb;
}

footer{
margin-top:70px;
padding:26px 0;
border-top:1px solid rgba(255,255,255,0.08);
text-align:center;
color:#7c8799;
}

@media(max-width:860px){

.tool{
grid-template-columns:1fr;
}

.hero h1{
font-size:52px;
}

}

</style>
</head>
<body>

<div class="container">

<header>
<div class="logo"><span>Toolivo</span></div>
</header>

<section class="hero">

<h1><span>QR Code</span><br>generator.</h1>

<p>
Generate beautiful QR codes instantly for links, text, social media, WiFi passwords and more.
</p>

</section>

<section class="tool">

<div class="panel">

<input 
type="text" 
class="input" 
id="qrInput"
placeholder="Paste link or enter text..."
>

<button class="btn" id="generateBtn">
Generate QR Code
</button>

<div class="info">
Examples:
<br><br>
https://toolivo.site
<br>
https://instagram.com/ventillo.com.tr
<br>
WIFI:T:WPA;S:MyWiFi;P:12345678;;
</div>

</div>

<div class="panel qr-wrap">

<div id="qrcode"></div>

</div>

</section>

<footer>
© 2026 Toolivo — QR Generator
</footer>

</div>

<script>

const qrInput = document.getElementById('qrInput');

const qrContainer = document.getElementById('qrcode');

const generateBtn = document.getElementById('generateBtn');

let qr = null;

function generateQR(){

const value = qrInput.value.trim();

if(!value) return;

qrContainer.innerHTML = '';

qr = new QRCode(qrContainer,{
text:value,
width:280,
height:280,
colorDark:'#000000',
colorLight:'#ffffff',
correctLevel:QRCode.CorrectLevel.H
});

}

generateBtn.onclick = generateQR;

qrInput.addEventListener('keydown',e=>{

if(e.key === 'Enter'){
generateQR();
}

});

qrInput.value = 'https://toolivo.site';

generateQR();

</script>

</body>
</html>
