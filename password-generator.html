<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Toolivo</title>
<meta name="description" content="Generate secure random passwords instantly with Toolivo. Choose length, uppercase, numbers and symbols.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#05070d;color:white}
.wrap{width:min(900px,calc(100% - 28px));margin:auto;padding:40px 0}
h1{font-size:56px;margin:20px 0 10px}
p{color:#9ca8bb}
.panel{background:#0b1020;border:1px solid #263244;border-radius:20px;padding:18px;margin-top:18px}
.output{font-size:24px;word-break:break-all;background:#05070d;border:1px solid #263244;border-radius:16px;padding:18px;margin-bottom:14px}
label{display:block;margin:14px 0;color:#9ca8bb}
input[type=range]{width:100%}
button{padding:15px 20px;border:0;border-radius:16px;background:linear-gradient(90deg,#39e6d2,#6ea8ff);font-weight:800;cursor:pointer;margin-right:8px}
.copy{background:#121935;color:white;border:1px solid #263244}
.check{display:flex;gap:10px;align-items:center}
</style>
</head>
<body>
<div class="wrap">
<h1>Password Generator</h1>
<p>Create strong random passwords instantly.</p>

<div class="panel">
<div class="output" id="password"></div>

<label>Length: <b id="lenVal">16</b></label>
<input type="range" id="length" min="6" max="64" value="16">

<label class="check"><input type="checkbox" id="upper" checked> Uppercase letters</label>
<label class="check"><input type="checkbox" id="lower" checked> Lowercase letters</label>
<label class="check"><input type="checkbox" id="numbers" checked> Numbers</label>
<label class="check"><input type="checkbox" id="symbols" checked> Symbols</label>

<button onclick="generate()">Generate</button>
<button class="copy" onclick="copyPass()">Copy</button>
</div>
</div>

<script>
const pass=document.getElementById('password');
const length=document.getElementById('length');
const lenVal=document.getElementById('lenVal');

function generate(){
 let chars='';
 if(upper.checked) chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
 if(lower.checked) chars+='abcdefghijklmnopqrstuvwxyz';
 if(numbers.checked) chars+='0123456789';
 if(symbols.checked) chars+='!@#$%^&*()_+-=[]{};:,.<>?';
 if(!chars) chars='abcdefghijklmnopqrstuvwxyz';

 let out='';
 const arr=new Uint32Array(Number(length.value));
 crypto.getRandomValues(arr);

 for(let i=0;i<arr.length;i++){
   out+=chars[arr[i]%chars.length];
 }

 pass.textContent=out;
}

function copyPass(){
 navigator.clipboard.writeText(pass.textContent);
}

length.oninput=()=>{
 lenVal.textContent=length.value;
 generate();
};

document.querySelectorAll('input[type=checkbox]').forEach(x=>x.onchange=generate);

generate();
</script>
</body>
</html>
