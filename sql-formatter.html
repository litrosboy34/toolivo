<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Formatter — Toolivo</title>
<meta name="description" content="Format and beautify SQL queries instantly with Toolivo.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#05070d;
color:white;
}

.wrap{
width:min(1100px,calc(100% - 28px));
margin:auto;
padding:40px 0;
}

h1{
font-size:56px;
margin:20px 0 10px;
}

p{
color:#9ca8bb;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.panel{
background:#0b1020;
border:1px solid #263244;
border-radius:20px;
padding:18px;
}

.label{
font-size:14px;
font-weight:bold;
color:#9ca8bb;
margin-bottom:10px;
}

textarea{
width:100%;
min-height:420px;
border-radius:18px;
border:1px solid #263244;
background:#05070d;
color:white;
padding:18px;
font-size:15px;
line-height:1.7;
box-sizing:border-box;
resize:vertical;
font-family:monospace;
}

button{
padding:15px 20px;
border:0;
border-radius:16px;
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
font-weight:800;
cursor:pointer;
margin:10px 10px 0 0;
}

.copy{
background:#121935;
color:white;
border:1px solid #263244;
}

.status{
margin-top:14px;
padding:14px;
border-radius:14px;
background:#121935;
border:1px solid #263244;
color:#9ca8bb;
line-height:1.7;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

h1{
font-size:42px;
}

}
</style>
</head>
<body>

<div class="wrap">

<h1>SQL Formatter</h1>

<p>
Beautify and format SQL queries instantly with Toolivo.
</p>

<div class="grid">

<div class="panel">

<div class="label">Input SQL</div>

<textarea id="input">select id,name,email from users where active=1 and country='Turkey' order by created_at desc;</textarea>

<button onclick="formatSQL()">Format SQL</button>
<button class="copy" onclick="clearAll()">Clear</button>

<div class="status">
Keywords will automatically be formatted and aligned.
</div>

</div>

<div class="panel">

<div class="label">Formatted Output</div>

<textarea id="output" readonly></textarea>

<button onclick="copyOutput()">Copy Output</button>

</div>

</div>

</div>

<script>
const input=document.getElementById('input');
const output=document.getElementById('output');

const keywords=[
'SELECT',
'FROM',
'WHERE',
'ORDER BY',
'GROUP BY',
'HAVING',
'LIMIT',
'INSERT INTO',
'VALUES',
'UPDATE',
'SET',
'DELETE',
'INNER JOIN',
'LEFT JOIN',
'RIGHT JOIN',
'JOIN',
'ON',
'AND',
'OR'
];

function formatSQL(){

let sql=input.value;

keywords.forEach(word=>{

const regex=new RegExp(word,'gi');

sql=sql.replace(regex,'\\n'+word);

});

sql=sql
.replace(/\\n+/g,'\\n')
.replace(/^\\n/,'')
.trim();

output.value=sql;
}

function copyOutput(){
navigator.clipboard.writeText(output.value);
}

function clearAll(){
input.value='';
output.value='';
}

formatSQL();
</script>

</body>
</html>
