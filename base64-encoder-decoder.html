<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder Decoder — Toolivo</title>
<meta name="description" content="Encode and decode Base64 instantly with Toolivo. Free online Base64 encoder and decoder tool.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#05070d;
color:white;
}

.wrap{
width:min(1000px,calc(100% - 28px));
margin:auto;
padding:40px 0;
}

h1{
font-size:56px;
margin:20px 0 10px;
}

p{
color:#9ca8bb;
margin-bottom:25px;
}

.panel{
background:#0b1020;
border:1px solid #263244;
border-radius:20px;
padding:18px;
margin-top:18px;
}

textarea{
width:100%;
min-height:220px;
border-radius:18px;
border:1px solid #263244;
background:#05070d;
color:white;
padding:18px;
font-size:16px;
line-height:1.6;
box-sizing:border-box;
resize:vertical;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

button{
padding:15px 20px;
border:0;
border-radius:16px;
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
font-weight:800;
cursor:pointer;
margin:10px 10px 0 0;
}

.copy{
background:#121935;
color:white;
border:1px solid #263244;
}

.label{
font-size:14px;
font-weight:bold;
color:#9ca8bb;
margin-bottom:10px;
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr;
}

h1{
font-size:42px;
}
}
</style>
</head>
<body>

<div class="wrap">

<h1>Base64 Encoder / Decoder</h1>

<p>
Encode and decode Base64 text instantly with Toolivo.
</p>

<div class="grid">

<div class="panel">
<div class="label">Input</div>

<textarea id="input" placeholder="Paste your text or Base64 here..."></textarea>

<button onclick="encodeText()">Encode</button>
<button onclick="decodeText()">Decode</button>
<button class="copy" onclick="clearAll()">Clear</button>
</div>

<div class="panel">
<div class="label">Output</div>

<textarea id="output" readonly placeholder="Result will appear here..."></textarea>

<button onclick="copyOutput()">Copy Output</button>
</div>

</div>

</div>

<script>
const input=document.getElementById('input');
const output=document.getElementById('output');

function encodeText(){
try{
output.value=btoa(unescape(encodeURIComponent(input.value)));
}catch{
output.value='Encoding error';
}
}

function decodeText(){
try{
output.value=decodeURIComponent(escape(atob(input.value)));
}catch{
output.value='Invalid Base64';
}
}

function copyOutput(){
navigator.clipboard.writeText(output.value);
}

function clearAll(){
input.value='';
output.value='';
}
</script>

</body>
</html>
