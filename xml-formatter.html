</p>

<div class="panel">

<div class="label">
Input XML
</div>

<textarea id="input"><note><to>Yunus</to><from>Toolivo</from><message>Hello</message></note></textarea>

<button onclick="formatXML()">

<script>

const input=document.getElementById('input');
const output=document.getElementById('output');
const status=document.getElementById('status');

function formatXML(){

try{

const parser=new DOMParser();

const xmlDoc=
parser.parseFromString(
input.value,
'application/xml'
);

if(xmlDoc.querySelector('parsererror')){
throw new Error('Invalid XML');
}

const serializer=new XMLSerializer();

const xmlString=
serializer.serializeToString(xmlDoc);

let formatted='';
let indent=0;

xmlString
.replace(/(>)(<)(\/*)/g,'$1\n$2$3')
.split('\n')
.forEach(line=>{

if(line.match(/^<\/\w/)){
indent--;
}

formatted+=`${'  '.repeat(indent)}${line}\n`;

if(
line.match(/^<[^!?].*[^/]>/)
&& !line.includes('</')
){
indent++;
}

});

output.value=formatted.trim();

status.textContent='Valid XML ✔';
status.className='status success';

}catch(err){

output.value='';

status.textContent='Invalid XML ❌';
status.className='status error';

}

}

function copyOutput(){
navigator.clipboard.writeText(output.value);
}

function clearAll(){

input.value='';
output.value='';

status.textContent='Ready.';
status.className='status';

}

document.getElementById("year").innerText =
new Date().getFullYear();

formatXML();

</script>
