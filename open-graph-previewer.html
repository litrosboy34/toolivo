<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Graph Previewer - Toolivo</title>
<meta name="description" content="Preview Open Graph meta tags instantly with live social card preview.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1050px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input,textarea{
    width:100%;
    background:#020617;
    border:1px solid #334155;
    color:white;
    border-radius:12px;
    padding:14px;
    outline:none;
    margin-bottom:18px;
}

textarea{
    height:110px;
    resize:vertical;
}

.preview{
    background:white;
    border-radius:18px;
    overflow:hidden;
    color:black;
    max-width:520px;
    margin:auto;
}

.preview-image{
    width:100%;
    height:240px;
    object-fit:cover;
    background:#cbd5e1;
}

.preview-content{
    padding:16px;
}

.preview-domain{
    font-size:12px;
    color:#64748b;
    margin-bottom:8px;
    text-transform:uppercase;
}

.preview-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
    line-height:1.3;
}

.preview-desc{
    color:#475569;
    line-height:1.5;
    font-size:15px;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

.output{
    width:100%;
    height:260px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Open Graph Previewer</div>

    <div class="desc">
        Preview Open Graph meta tags instantly with live social media card preview.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <label>Website URL</label>
                <input type="text" id="url" placeholder="https://toolivo.site">

                <label>Open Graph Title</label>
                <input type="text" id="titleInput" placeholder="Your awesome page title">

                <label>Open Graph Description</label>
                <textarea id="descInput" placeholder="Write a description..."></textarea>

                <label>Image URL</label>
                <input type="text" id="imageInput" placeholder="https://example.com/image.jpg">

            </div>

            <div>

                <div class="preview">

                    <img
                        id="previewImage"
                        class="preview-image"
                        src="https://placehold.co/1200x630/0f172a/ffffff?text=Toolivo"
                    >

                    <div class="preview-content">

                        <div class="preview-domain" id="previewDomain">
                            toolivo.site
                        </div>

                        <div class="preview-title" id="previewTitle">
                            Your Open Graph Title
                        </div>

                        <div class="preview-desc" id="previewDesc">
                            Your Open Graph description preview will appear here.
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <div class="buttons">

            <button class="generate" onclick="generateOG()">
                Generate
            </button>

            <button class="copy" onclick="copyCode()">
                Copy Meta Tags
            </button>

        </div>

        <textarea class="output" id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateOG(){

    const url =
    document.getElementById("url").value.trim();

    const title =
    document.getElementById("titleInput").value.trim();

    const desc =
    document.getElementById("descInput").value.trim();

    const image =
    document.getElementById("imageInput").value.trim();

    document.getElementById("previewTitle").innerText =
    title || "Your Open Graph Title";

    document.getElementById("previewDesc").innerText =
    desc || "Your Open Graph description preview will appear here.";

    if(url){

        try{
            const domain = new URL(url).hostname;

            document.getElementById("previewDomain").innerText =
            domain;

        }catch{
            document.getElementById("previewDomain").innerText =
            url;
        }
    }

    if(image){
        document.getElementById("previewImage").src = image;
    }

    const code =
`<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:url" content="${url}">
<meta property="og:image" content="${image}">
<meta property="og:type" content="website">`;

    document.getElementById("output").value =
    code;
}

function copyCode(){

    const output =
    document.getElementById("output");

    if(!output.value){
        alert("Generate meta tags first.");
        return;
    }

    navigator.clipboard.writeText(output.value);

    alert("Copied!");
}

document.querySelectorAll("input,textarea").forEach(el => {
    el.addEventListener("input", generateOG);
});

generateOG();
</script>

</body>
</html>
