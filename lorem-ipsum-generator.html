<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Toolivo</title>
<meta name="description" content="Generate Lorem Ipsum placeholder text instantly with Toolivo. Create words, sentences and paragraphs for design and development.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#05070d;color:white}
.wrap{width:min(1000px,calc(100% - 28px));margin:auto;padding:40px 0}
h1{font-size:56px;margin:20px 0 10px}
p{color:#9ca8bb}
.panel{background:#0b1020;border:1px solid #263244;border-radius:20px;padding:18px;margin-top:18px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
label{color:#9ca8bb;font-size:14px;font-weight:bold}
input,select{width:100%;height:48px;border-radius:14px;border:1px solid #263244;background:#05070d;color:white;padding:0 12px;margin-top:8px;box-sizing:border-box}
button{padding:15px;border:0;border-radius:16px;background:linear-gradient(90deg,#39e6d2,#6ea8ff);font-weight:800;cursor:pointer;margin-top:14px}
.output{white-space:pre-wrap;line-height:1.7;font-size:17px;min-height:260px}
.copy{background:#121935;color:white;border:1px solid #263244;margin-left:8px}
@media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:42px}}
</style>
</head>
<body>
<div class="wrap">
<h1>Lorem Ipsum Generator</h1>
<p>Generate placeholder text for websites, designs, mockups and layouts.</p>

<div class="panel">
<div class="grid">
<div>
<label>Type</label>
<select id="type">
<option value="paragraphs">Paragraphs</option>
<option value="sentences">Sentences</option>
<option value="words">Words</option>
</select>
</div>

<div>
<label>Amount</label>
<input id="amount" type="number" min="1" max="50" value="3">
</div>

<div>
<label>Start with Lorem ipsum</label>
<select id="start">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>
</div>

<button onclick="generate()">Generate Text</button>
<button class="copy" onclick="copyText()">Copy</button>
</div>

<div class="panel output" id="output"></div>
</div>

<script>
const words=`lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit voluptate velit esse cillum dolore eu fugiat nulla pariatur`.split(' ');

function randWord(){return words[Math.floor(Math.random()*words.length)]}

function makeSentence(){
let len=Math.floor(Math.random()*8)+8;
let arr=[];
for(let i=0;i<len;i++)arr.push(randWord());
let s=arr.join(' ');
return s.charAt(0).toUpperCase()+s.slice(1)+'.';
}

function makeParagraph(){
let count=Math.floor(Math.random()*3)+4;
let arr=[];
for(let i=0;i<count;i++)arr.push(makeSentence());
return arr.join(' ');
}

function generate(){
const type=document.getElementById('type').value;
const amount=Math.max(1,Number(document.getElementById('amount').value)||1);
const start=document.getElementById('start').value;
let out=[];

if(type==='words'){
for(let i=0;i<amount;i++)out.push(randWord());
out=out.join(' ');
}

if(type==='sentences'){
for(let i=0;i<amount;i++)out.push(makeSentence());
out=out.join(' ');
}

if(type==='paragraphs'){
for(let i=0;i<amount;i++)out.push(makeParagraph());
out=out.join('\\n\\n');
}

if(start==='yes'){
out='Lorem ipsum dolor sit amet, consectetur adipiscing elit. '+out;
}

document.getElementById('output').textContent=out;
}

function copyText(){
navigator.clipboard.writeText(document.getElementById('output').textContent);
}

generate();
</script>
</body>
</html>
