<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSON to CSV Converter - Toolivo</title>
<meta name="description" content="Convert JSON to CSV instantly with copyable output.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;padding:20px}
.container{max-width:1050px;margin:auto}
.title{font-size:32px;font-weight:bold;margin-bottom:10px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{color:#94a3b8;margin-bottom:25px;line-height:1.6}
.card{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
label{display:block;margin-bottom:8px;color:#cbd5e1;font-size:14px}
textarea{width:100%;height:360px;background:#020617;border:1px solid #1e293b;color:#38bdf8;border-radius:12px;padding:15px;resize:vertical;line-height:1.5}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
button{padding:13px 20px;border:none;border-radius:12px;font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(90deg,#06b6d4,#3b82f6);color:white}
.copy{background:#1e293b;color:white}
.clear{background:#020617;color:white;border:1px solid #334155}
.message{margin-top:15px;color:#94a3b8;font-size:14px}
.footer{text-align:center;color:#64748b;margin-top:25px;font-size:14px}
</style>
</head>

<body>

<div class="container">

    <div class="title">JSON to CSV Converter</div>
    <div class="desc">Convert JSON arrays to CSV instantly. Paste JSON, generate CSV, and copy the result.</div>

    <div class="card">

        <div class="grid">

            <div>
                <label>JSON Input</label>
                <textarea id="jsonInput" placeholder='[{"name":"John","age":30},{"name":"Jane","age":25}]'></textarea>
            </div>

            <div>
                <label>CSV Output</label>
                <textarea id="csvOutput" placeholder="CSV output will appear here..."></textarea>
            </div>

        </div>

        <div class="buttons">
            <button class="generate" onclick="convertJSONtoCSV()">Convert</button>
            <button class="copy" onclick="copyCSV()">Copy CSV</button>
            <button class="clear" onclick="clearAll()">Clear</button>
        </div>

        <div class="message" id="message"></div>

    </div>

    <div class="footer">Toolivo © 2026</div>

</div>

<script>
function escapeCSV(value){
    if(value === null || value === undefined){
        return "";
    }

    value = String(value);

    if(value.includes('"')){
        value = value.replace(/"/g, '""');
    }

    if(value.includes(",") || value.includes("\\n") || value.includes('"')){
        value = '"' + value + '"';
    }

    return value;
}

function flattenObject(obj, prefix = ""){
    let result = {};

    for(const key in obj){
        const value = obj[key];
        const newKey = prefix ? prefix + "." + key : key;

        if(value && typeof value === "object" && !Array.isArray(value)){
            Object.assign(result, flattenObject(value, newKey));
        }else{
            result[newKey] = Array.isArray(value) ? JSON.stringify(value) : value;
        }
    }

    return result;
}

function convertJSONtoCSV(){
    const input = document.getElementById("jsonInput").value.trim();
    const message = document.getElementById("message");

    if(!input){
        message.innerText = "Please paste JSON first.";
        return;
    }

    try{
        let data = JSON.parse(input);

        if(!Array.isArray(data)){
            data = [data];
        }

        const flatData = data.map(item => flattenObject(item));

        const headers = [...new Set(flatData.flatMap(item => Object.keys(item)))];

        const csvRows = [];

        csvRows.push(headers.map(escapeCSV).join(","));

        flatData.forEach(item => {
            const row = headers.map(header => escapeCSV(item[header]));
            csvRows.push(row.join(","));
        });

        document.getElementById("csvOutput").value = csvRows.join("\\n");

        message.innerText = "Converted successfully.";
    }catch(error){
        message.innerText = "Invalid JSON. Please check your input.";
    }
}

function copyCSV(){
    const output = document.getElementById("csvOutput");

    if(!output.value){
        alert("Convert JSON first.");
        return;
    }

    navigator.clipboard.writeText(output.value);
    alert("Copied!");
}

function clearAll(){
    document.getElementById("jsonInput").value = "";
    document.getElementById("csvOutput").value = "";
    document.getElementById("message").innerText = "";
}
</script>

</body>
</html>
