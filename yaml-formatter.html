<div class="container">

<header class="header">
<a class="logo" href="/">
<img src="https://i.imgur.com/7qzyyTa.png" alt="Toolivo">

</a>

<nav class="nav">
<a href="/">Home</a>

<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/contact.html">Contact</a>
</nav>
</header>

<section class="tool-hero">
<h1>YAML <span class="gradient">Formatter</span></h1>
<p>Clean and format YAML-style config text instantly with Toolivo.</p>
</section>

<div class="grid">

<div class="panel">
<div class="label">Input YAML</div>

<textarea id="input">name: Toolivo
version: 1.0
features:
- fast
- free
- browser based</textarea>

<button onclick="formatYAML()">Format YAML</button>
<button class="copy" onclick="clearAll()">Clear</button>

<div class="status" id="status">Ready.</div>
</div>

<div class="panel">
<div class="label">Formatted Output</div>
<textarea id="output" readonly></textarea>
<button onclick="copyOutput()">Copy Output</button>
</div>

</div>

<footer class="footer">
<div>© <span id="year"></span> Toolivo. All rights reserved.</div>
<div class="footer-links">
<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/terms.html">Terms</a>
<a href="/contact.html">Contact</a>
<a href="/sitemap.xml">Sitemap</a>
</div>
</footer>

</div>

<script>
const input=document.getElementById('input');
const output=document.getElementById('output');
const status=document.getElementById('status');

function formatYAML(){
let lines=input.value.split('\n');

let formatted=lines
.map(line=>line.trim())
.filter(line=>line.length>0)
.map(line=>{
if(line.startsWith('-')) return '  '+line;
return line;
})
.join('\n');

output.value=formatted;
status.textContent='YAML cleaned ✔';
}

function copyOutput(){
navigator.clipboard.writeText(output.value);
}

function clearAll(){
input.value='';
output.value='';
status.textContent='Ready.';
}

document.getElementById("year").innerText=new Date().getFullYear();

formatYAML();
</script>

</body>
