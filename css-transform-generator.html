<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Transform Generator - Toolivo</title>

<meta name="description" content="Generate CSS transform effects instantly with live preview and copyable code.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input{
    width:100%;
    accent-color:#0ea5e9;
}

.value{
    margin-top:6px;
    color:#38bdf8;
    font-size:14px;
}

.preview{
    min-height:340px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.box{
    width:180px;
    height:180px;
    border-radius:24px;
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
    transition:0.2s;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

textarea{
    width:100%;
    height:220px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">CSS Transform Generator</div>

    <div class="desc">
        Generate CSS transform effects instantly with live preview and copyable CSS code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Rotate</label>
                    <input type="range" id="rotate" min="-360" max="360" value="0">
                    <div class="value" id="rotateValue">0deg</div>
                </div>

                <div class="control">
                    <label>Scale</label>
                    <input type="range" id="scale" min="0.1" max="3" step="0.1" value="1">
                    <div class="value" id="scaleValue">1</div>
                </div>

                <div class="control">
                    <label>Translate X</label>
                    <input type="range" id="translateX" min="-200" max="200" value="0">
                    <div class="value" id="translateXValue">0px</div>
                </div>

                <div class="control">
                    <label>Translate Y</label>
                    <input type="range" id="translateY" min="-200" max="200" value="0">
                    <div class="value" id="translateYValue">0px</div>
                </div>

                <div class="control">
                    <label>Skew</label>
                    <input type="range" id="skew" min="-90" max="90" value="0">
                    <div class="value" id="skewValue">0deg</div>
                </div>

            </div>

            <div>

                <div class="preview">
                    <div class="box" id="box"></div>
                </div>

            </div>

        </div>

        <div class="buttons">
            <button class="generate" onclick="generateTransform()">
                Generate
            </button>

            <button class="copy" onclick="copyCSS()">
                Copy CSS
            </button>
        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateTransform(){

    const rotate =
    document.getElementById("rotate").value;

    const scale =
    document.getElementById("scale").value;

    const translateX =
    document.getElementById("translateX").value;

    const translateY =
    document.getElementById("translateY").value;

    const skew =
    document.getElementById("skew").value;

    document.getElementById("rotateValue").innerText =
    rotate + "deg";

    document.getElementById("scaleValue").innerText =
    scale;

    document.getElementById("translateXValue").innerText =
    translateX + "px";

    document.getElementById("translateYValue").innerText =
    translateY + "px";

    document.getElementById("skewValue").innerText =
    skew + "deg";

    const transform =
`rotate(${rotate}deg)
 scale(${scale})
 translateX(${translateX}px)
 translateY(${translateY}px)
 skew(${skew}deg)`;

    document.getElementById("box").style.transform =
    transform;

    document.getElementById("output").value =
`.transform-element{
    transform:${transform};
}`;
}

function copyCSS(){

    navigator.clipboard.writeText(
        document.getElementById("output").value
    );

    alert("Copied!");
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", generateTransform);
});

generateTransform();
</script>

</body>
</html>
