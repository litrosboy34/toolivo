<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Box Shadow Generator - Toolivo</title>
<meta name="description" content="Generate CSS box-shadow instantly with live preview and copyable code.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1050px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input[type="range"],
input[type="color"]{
    width:100%;
}

input[type="range"]{
    accent-color:#0ea5e9;
}

input[type="color"]{
    height:55px;
    border:none;
    background:none;
    cursor:pointer;
}

.value{
    margin-top:6px;
    color:#38bdf8;
    font-size:14px;
}

.preview{
    min-height:350px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.box{
    width:220px;
    height:220px;
    border-radius:24px;
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

textarea{
    width:100%;
    height:220px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">CSS Box Shadow Generator</div>

<div class="desc">
Generate CSS box shadows instantly with live preview and copyable code.
</div>

<div class="card">

<div class="grid">

<div>

<div class="control">
<label>Horizontal Offset</label>
<input type="range" id="x" min="-100" max="100" value="0">
<div class="value" id="xVal">0px</div>
</div>

<div class="control">
<label>Vertical Offset</label>
<input type="range" id="y" min="-100" max="100" value="20">
<div class="value" id="yVal">20px</div>
</div>

<div class="control">
<label>Blur Radius</label>
<input type="range" id="blur" min="0" max="100" value="40">
<div class="value" id="blurVal">40px</div>
</div>

<div class="control">
<label>Spread Radius</label>
<input type="range" id="spread" min="-50" max="50" value="0">
<div class="value" id="spreadVal">0px</div>
</div>

<div class="control">
<label>Shadow Color</label>
<input type="color" id="color" value="#000000">
</div>

<div class="control">
<label>Opacity</label>
<input type="range" id="opacity" min="0" max="1" step="0.01" value="0.35">
<div class="value" id="opacityVal">0.35</div>
</div>

</div>

<div>

<div class="preview">
<div class="box" id="box"></div>
</div>

</div>

</div>

<div class="buttons">

<button class="generate" onclick="generateShadow()">
Generate
</button>

<button class="copy" onclick="copyCSS()">
Copy CSS
</button>

</div>

<textarea id="output"></textarea>

</div>

<div class="footer">
Toolivo © 2026
</div>

</div>

<script>
function hexToRgb(hex){

    hex = hex.replace("#","");

    return {
        r:parseInt(hex.substring(0,2),16),
        g:parseInt(hex.substring(2,4),16),
        b:parseInt(hex.substring(4,6),16)
    };
}

function generateShadow(){

    const x =
    document.getElementById("x").value;

    const y =
    document.getElementById("y").value;

    const blur =
    document.getElementById("blur").value;

    const spread =
    document.getElementById("spread").value;

    const color =
    document.getElementById("color").value;

    const opacity =
    document.getElementById("opacity").value;

    document.getElementById("xVal").innerText =
    x + "px";

    document.getElementById("yVal").innerText =
    y + "px";

    document.getElementById("blurVal").innerText =
    blur + "px";

    document.getElementById("spreadVal").innerText =
    spread + "px";

    document.getElementById("opacityVal").innerText =
    opacity;

    const rgb = hexToRgb(color);

    const shadow =
`${x}px ${y}px ${blur}px ${spread}px rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;

    document.getElementById("box").style.boxShadow =
    shadow;

    document.getElementById("output").value =
`.box{
    box-shadow:${shadow};
}`;
}

function copyCSS(){

    navigator.clipboard.writeText(
        document.getElementById("output").value
    );

    alert("Copied!");
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", generateShadow);
});

generateShadow();
</script>

</body>
</html>
