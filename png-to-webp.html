<body>

<div class="container">

<header>
  <div class="logo"><span>Toolivo</span></div>
</header>

<section class="hero">
  <h1><span>PNG to WEBP</span><br>converter.</h1>
  <p>
    Convert PNG images to WEBP instantly. Reduce file size and generate modern WEBP images directly in your browser.
  </p>
</section>

<section class="tool-box">

  <div class="panel">

    <label class="drop" for="fileInput">
      <div style="font-size:56px">🖼️</div>
      <h2>Drop your PNG image</h2>
      <p>or click to browse from your device.</p>
    </label>

    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">

    <div class="preview" id="preview">
      <img id="previewImg">
    </div>

  </div>

  <div class="panel controls">

    <div class="info" id="info">
      Choose a PNG image to begin.
    </div>

    <div class="slider-wrap">
      <label>
        <span>WEBP Quality</span>
        <span id="qualityValue">85%</span>
      </label>

      <input type="range" id="quality" min="10" max="100" value="85">
    </div>

    <button class="btn" id="downloadBtn" disabled>
      Convert & Download WEBP
    </button>

    <div class="info">
      Your image never leaves your device. Everything is processed locally in your browser.
    </div>

  </div>

</section>

<footer>
  © 2026 Toolivo — PNG to WEBP Tool
</footer>

</div>

<script>
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const info = document.getElementById('info');
const downloadBtn = document.getElementById('downloadBtn');
const quality = document.getElementById('quality');
const qualityValue = document.getElementById('qualityValue');

let imageBitmap = null;
let fileName = 'toolivo-image';

quality.oninput = () => {
  qualityValue.textContent = quality.value + '%';
};

fileInput.onchange = async (e) => {

  const file = e.target.files[0];
  if(!file) return;

  fileName = file.name.replace(/\.[^/.]+$/, "");

  imageBitmap = await createImageBitmap(file);

  preview.style.display = 'block';
  previewImg.src = URL.createObjectURL(file);

  info.innerHTML = `
    ${file.name}<br>
    ${imageBitmap.width} × ${imageBitmap.height}<br>
    ${(file.size / 1024).toFixed(1)} KB
  `;

  downloadBtn.disabled = false;
};

downloadBtn.onclick = () => {

  if(!imageBitmap) return;

  const canvas = document.createElement('canvas');
  canvas.width = imageBitmap.width;
  canvas.height = imageBitmap.height;

  const ctx = canvas.getContext('2d');

  ctx.drawImage(imageBitmap,0,0);

  canvas.toBlob(blob => {

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');

    a.href = url;
    a.download = fileName + '-toolivo.webp';

    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

  }, 'image/webp', Number(quality.value)/100);

};
</script>
