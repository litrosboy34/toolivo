<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neon Text Generator - Toolivo</title>
<meta name="description" content="Generate neon text CSS instantly with live preview and copyable code.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#020617;color:white;padding:20px}
.container{max-width:1000px;margin:auto}
.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}
.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }
}
.control{
    margin-bottom:18px;
}
label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}
input{
    width:100%;
    background:#020617;
    border:1px solid #334155;
    color:white;
    border-radius:12px;
    padding:14px;
    outline:none;
}
input[type="color"]{
    height:58px;
    padding:5px;
    cursor:pointer;
}
input[type="range"]{
    accent-color:#0ea5e9;
    padding:0;
}
.value{
    margin-top:6px;
    color:#38bdf8;
    font-size:14px;
}
.preview{
    min-height:320px;
    background:#000;
    border:1px solid #1e293b;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:25px;
}
.preview-text{
    font-weight:800;
    line-height:1.2;
}
.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}
button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}
.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}
.copy{
    background:#1e293b;
    color:white;
}
textarea{
    width:100%;
    height:220px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}
.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Neon Text Generator</div>

    <div class="desc">
        Generate glowing neon text CSS instantly with live preview and copyable code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Text</label>
                    <input type="text" id="textInput" value="Neon Text">
                </div>

                <div class="control">
                    <label>Neon Color</label>
                    <input type="color" id="colorInput" value="#06b6d4">
                </div>

                <div class="control">
                    <label>Glow Size</label>
                    <input type="range" id="glowInput" min="0" max="80" value="25">
                    <div class="value" id="glowValue">25px</div>
                </div>

                <div class="control">
                    <label>Font Size</label>
                    <input type="range" id="fontInput" min="20" max="120" value="56">
                    <div class="value" id="fontValue">56px</div>
                </div>

            </div>

            <div>

                <div class="preview">
                    <div class="preview-text" id="previewText">
                        Neon Text
                    </div>
                </div>

            </div>

        </div>

        <div class="buttons">
            <button class="generate" onclick="generateNeon()">Generate</button>
            <button class="copy" onclick="copyCSS()">Copy CSS</button>
        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateNeon(){

    const text =
    document.getElementById("textInput").value;

    const color =
    document.getElementById("colorInput").value;

    const glow =
    document.getElementById("glowInput").value;

    const font =
    document.getElementById("fontInput").value;

    document.getElementById("glowValue").innerText =
    glow + "px";

    document.getElementById("fontValue").innerText =
    font + "px";

    const preview =
    document.getElementById("previewText");

    preview.innerText = text;

    preview.style.color = color;

    preview.style.fontSize = font + "px";

    preview.style.textShadow =
    `0 0 ${glow}px ${color},
     0 0 ${glow * 2}px ${color}`;

    const css =
`.neon-text{
    color:${color};
    font-size:${font}px;
    font-weight:800;
    text-shadow:
        0 0 ${glow}px ${color},
        0 0 ${glow * 2}px ${color};
}`;

    document.getElementById("output").value = css;
}

function copyCSS(){

    navigator.clipboard.writeText(
        document.getElementById("output").value
    );

    alert("Copied!");
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", generateNeon);
});

generateNeon();
</script>

</body>
</html>
