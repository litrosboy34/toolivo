<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Animation Generator - Toolivo</title>

<meta name="description" content="Generate CSS animations instantly with live preview and copyable code.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

select,
input{
    width:100%;
    background:#020617;
    border:1px solid #334155;
    color:white;
    border-radius:12px;
    padding:14px;
    outline:none;
}

input[type="range"]{
    accent-color:#0ea5e9;
    padding:0;
}

.preview{
    min-height:340px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.box{
    width:140px;
    height:140px;
    border-radius:24px;
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

textarea{
    width:100%;
    height:260px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-40px)}
}

@keyframes rotate{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.15)}
    100%{transform:scale(1)}
}

@keyframes fade{
    from{opacity:0.2}
    to{opacity:1}
}
</style>
</head>

<body>

<div class="container">

    <div class="title">CSS Animation Generator</div>

    <div class="desc">
        Generate CSS animations instantly with live preview and copyable CSS code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Animation Type</label>

                    <select id="animation">
                        <option value="bounce">bounce</option>
                        <option value="rotate">rotate</option>
                        <option value="pulse">pulse</option>
                        <option value="fade">fade</option>
                    </select>
                </div>

                <div class="control">
                    <label>Duration (seconds)</label>

                    <input type="range" id="duration" min="0.5" max="10" step="0.5" value="2">
                </div>

                <div class="control">
                    <label>Iteration Count</label>

                    <select id="iteration">
                        <option value="infinite">infinite</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="5">5</option>
                    </select>
                </div>

                <div class="control">
                    <label>Timing Function</label>

                    <select id="timing">
                        <option value="ease">ease</option>
                        <option value="linear">linear</option>
                        <option value="ease-in">ease-in</option>
                        <option value="ease-out">ease-out</option>
                        <option value="ease-in-out">ease-in-out</option>
                    </select>
                </div>

            </div>

            <div>

                <div class="preview">

                    <div class="box" id="box"></div>

                </div>

            </div>

        </div>

        <div class="buttons">

            <button class="generate" onclick="generateAnimation()">
                Generate
            </button>

            <button class="copy" onclick="copyCSS()">
                Copy CSS
            </button>

        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateAnimation(){

    const animation =
    document.getElementById("animation").value;

    const duration =
    document.getElementById("duration").value;

    const iteration =
    document.getElementById("iteration").value;

    const timing =
    document.getElementById("timing").value;

    const box =
    document.getElementById("box");

    box.style.animation =
    `${animation} ${duration}s ${timing} ${iteration}`;

    const css =
`.animated-element{
    animation:${animation} ${duration}s ${timing} ${iteration};
}

@keyframes ${animation}{
    /* Generated animation */
}`;

    document.getElementById("output").value = css;
}

function copyCSS(){

    navigator.clipboard.writeText(
        document.getElementById("output").value
    );

    alert("Copied!");
}

document.querySelectorAll("select,input").forEach(el => {
    el.addEventListener("input", generateAnimation);
});

generateAnimation();
</script>

</body>
</html>
