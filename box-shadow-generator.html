<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Shadow Generator - Toolivo</title>
<meta name="description" content="Generate CSS box shadows with live preview and copyable CSS code.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;padding:20px}
.container{max-width:950px;margin:auto}
.title{font-size:32px;font-weight:bold;margin-bottom:10px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{color:#94a3b8;margin-bottom:25px}
.card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:750px){.grid{grid-template-columns:1fr}}
label{display:block;margin-bottom:8px;color:#cbd5e1;font-size:14px}
.control{margin-bottom:18px}
input[type="range"]{width:100%;accent-color:#0ea5e9}
input[type="color"]{width:80px;height:50px;background:#020617;border:1px solid #334155;border-radius:10px;padding:4px}
.value{color:#38bdf8;font-size:13px;margin-top:5px}
.preview-area{display:flex;justify-content:center;align-items:center;min-height:280px;background:#020617;border:1px solid #1e293b;border-radius:16px}
.preview-box{width:180px;height:180px;background:white;border-radius:20px}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
button{padding:13px 20px;border:0;border-radius:12px;font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(90deg,#06b6d4,#3b82f6);color:white}
.copy{background:#1e293b;color:white}
textarea{width:100%;height:130px;margin-top:15px;background:#020617;border:1px solid #1e293b;color:#38bdf8;border-radius:12px;padding:14px;resize:vertical}
.footer{text-align:center;color:#64748b;margin-top:25px;font-size:14px}
</style>
</head>

                    <input type="range" id="x" min="-100" max="100" value="10">

                </div>

                    <label>Spread Radius</label>
                    <input type="range" id="spread" min="-50" max="50" value="0">
                    <div class="value" id="spreadVal">0px</div>
                </div>
