<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Box Shadow Generator - Toolivo</title>

<meta name="description" content="Generate CSS box shadows instantly with live preview and copyable code.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:950px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:30px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

.input-group input{
    background:#020617;
    border:1px solid #1e293b;
    color:white;
    padding:14px;
    border-radius:12px;
    outline:none;
}

input[type="color"]{
    height:60px;
    padding:5px;
    cursor:pointer;
}

.preview-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 0;
}

.preview-box{
    width:220px;
    height:220px;
    border-radius:20px;
    background:#06b6d4;
}

.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
    flex-wrap:wrap;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

button:hover{
    opacity:0.9;
    transform:translateY(-2px);
}

.output{
    width:100%;
    height:180px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
    margin-top:20px;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:30px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Box Shadow Generator</div>

    <div class="desc">
        Generate CSS box shadows instantly with live preview and copyable CSS code.
    </div>

    <div class="card">

        <div class="grid">

            <div class="input-group">
                <label>Horizontal Offset</label>
                <input type="range" id="x" min="-100" max="100" value="0">
            </div>

            <div class="input-group">
                <label>Vertical Offset</label>
                <input type="range" id="y" min="-100" max="100" value="10">
            </div>

            <div class="input-group">
                <label>Blur Radius</label>
                <input type="range" id="blur" min="0" max="100" value="30">
            </div>

            <div class="input-group">
                <label>Spread Radius</label>
                <input type="range" id="spread" min="-50" max="50" value="0">
            </div>

            <div class="input-group">
                <label>Shadow Color</label>
                <input type="color" id="color" value="#000000">
            </div>

            <div class="input-group">
                <label>Opacity (0 - 1)</label>
                <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.3">
            </div>

        </div>

        <div class="checkbox">
            <input type="checkbox" id="inset">
            <label for="inset">Inset Shadow</label>
        </div>

        <div class="preview-wrapper">
            <div class="preview-box" id="previewBox"></div>
        </div>

        <div class="buttons">
            <button class="generate" onclick="generateShadow()">
                Generate
            </button>

            <button class="copy" onclick="copyShadow()">
                Copy CSS
            </button>
        </div>

        <textarea class="output" id="output" placeholder="Generated CSS will appear here..."></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function hexToRgb(hex){

    hex = hex.replace("#","");

    const r = parseInt(hex.substring(0,2),16);
    const g = parseInt(hex.substring(2,4),16);
    const b = parseInt(hex.substring(4,6),16);

    return {r,g,b};
}

function generateShadow(){

    const x = document.getElementById("x").value;
    const y = document.getElementById("y").value;
    const blur = document.getElementById("blur").value;
    const spread = document.getElementById("spread").value;
    const color = document.getElementById("color").value;
    const opacity = document.getElementById("opacity").value;
    const inset = document.getElementById("inset").checked;

    const rgb = hexToRgb(color);

    const shadow =
`${inset ? "inset " : ""}${x}px ${y}px ${blur}px ${spread}px rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;

    document.getElementById("previewBox").style.boxShadow = shadow;

    document.getElementById("output").value =
`box-shadow: ${shadow};`;
}

function copyShadow(){

    const output = document.getElementById("output");

    if(!output.value){
        alert("Generate shadow first.");
        return;
    }

    navigator.clipboard.writeText(output.value);

    alert("Copied!");
}

generateShadow();
</script>

</body>
</html>
