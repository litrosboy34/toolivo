<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text to Slug Generator - Toolivo</title>
<meta name="description" content="Convert text to SEO friendly URL slugs instantly.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;padding:20px}
.container{max-width:950px;margin:auto}
.title{font-size:32px;font-weight:bold;margin-bottom:10px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{color:#94a3b8;margin-bottom:25px;line-height:1.6}
.card{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:20px;margin-bottom:20px}
label{display:block;margin-bottom:8px;color:#cbd5e1;font-size:14px}
textarea,input{width:100%;background:#020617;border:1px solid #334155;color:white;border-radius:12px;padding:14px;outline:none}
textarea{height:160px;resize:vertical;margin-bottom:18px}
input{margin-bottom:18px}
.buttons{display:flex;gap:12px;flex-wrap:wrap}
button{padding:13px 20px;border:none;border-radius:12px;font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(90deg,#06b6d4,#3b82f6);color:white}
.copy{background:#1e293b;color:white}
.clear{background:#020617;color:white;border:1px solid #334155}
.footer{text-align:center;color:#64748b;margin-top:25px;font-size:14px}
</style>
</head>

<body>

<div class="container">

<div class="title">Text to Slug Generator</div>
<div class="desc">Convert any text into a clean, SEO friendly URL slug.</div>

<div class="card">

<label>Text Input</label>
<textarea id="input" placeholder="Example: Best Free Online Tools"></textarea>

<label>Slug Output</label>
<input id="output" placeholder="best-free-online-tools" readonly>

<div class="buttons">
<button class="generate" onclick="generateSlug()">Generate Slug</button>
<button class="copy" onclick="copySlug()">Copy Slug</button>
<button class="clear" onclick="clearAll()">Clear</button>
</div>

</div>

<div class="footer">Toolivo © 2026</div>

</div>

<script>
function generateSlug(){
    const text = document.getElementById("input").value;

    const trMap = {
        "ç":"c","ğ":"g","ı":"i","ö":"o","ş":"s","ü":"u",
        "Ç":"c","Ğ":"g","İ":"i","Ö":"o","Ş":"s","Ü":"u"
    };

    let slug = text.replace(/[çğıöşüÇĞİÖŞÜ]/g, char => trMap[char] || char);

    slug = slug
        .toLowerCase()
        .trim()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9\s-]/g, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");

    document.getElementById("output").value = slug;
}

function copySlug(){
    const output = document.getElementById("output");

    if(!output.value){
        alert("Generate a slug first.");
        return;
    }

    navigator.clipboard.writeText(output.value);
    alert("Copied!");
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("output").value = "";
}

document.getElementById("input").addEventListener("input", generateSlug);
</script>

</body>
</html>
