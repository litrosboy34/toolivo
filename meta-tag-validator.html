<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3QBF2V9J5T"></script>
<script>
gtag('js', new Date());
gtag('config', 'G-3QBF2V9J5T', { send_page_view: true });
</script>

<title>Meta Tag Validator — Toolivo</title>
<meta name="description" content="Validate SEO meta tags instantly with Toolivo.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;min-height:100vh}
.container{max-width:1200px;margin:auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.logo{display:flex;align-items:center;font-size:34px;font-weight:bold}
.logo img{width:115px;height:115px;object-fit:contain}
.logo span{background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:14px;flex-wrap:wrap}
.nav a{color:#94a3b8;text-decoration:none}
.nav a:hover{color:white}
.hero{padding:45px 0 28px}
.hero h1{font-size:clamp(42px,7vw,64px);margin-bottom:14px}
.hero p{color:#94a3b8;max-width:760px;line-height:1.7}
.gradient{background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.panel{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:20px}
textarea{
width:100%;
height:340px;
background:#020617;
border:1px solid #334155;
border-radius:18px;
padding:18px;
color:white;
resize:vertical;
outline:none;
}
textarea:focus{border-color:#38bdf8}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
button{
padding:15px 20px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
}
.primary{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
}
.secondary{
background:#020617;
border:1px solid #334155;
color:#cbd5e1;
}
.results{
background:#020617;
border:1px solid #334155;
border-radius:18px;
padding:18px;
max-height:430px;
overflow:auto;
}
.item{
padding:14px;
border-bottom:1px solid #1e293b;
}
.item:last-child{border-bottom:none}
.good{color:#22c55e;font-weight:bold}
.bad{color:#ef4444;font-weight:bold}
.footer{
margin-top:55px;
padding:30px 0;
border-top:1px solid #1e293b;
text-align:center;
color:#64748b;
}
@media(max-width:900px){
.grid{grid-template-columns:1fr}
.header{flex-direction:column}
.logo img{width:95px;height:95px}
}
</style>
</head>

<body>

<div class="container">

<header class="header">

<div class="logo">
<img src="https://i.imgur.com/7qzyyTa.png" alt="Toolivo">
<span>Toolivo</span>
</div>

<nav class="nav">
<a href="/">Home</a>
<a href="/tools.html">Tools</a>
<a href="/about.html">About</a>
</nav>

</header>

<section class="hero">

<h1>Meta Tag <span class="gradient">Validator</span></h1>

<p>
Validate important SEO meta tags instantly from HTML source code.
</p>

</section>

<section class="grid">

<div class="panel">

<textarea
id="htmlInput"
placeholder="Paste your HTML here..."
></textarea>

<div class="buttons">

<button class="primary" onclick="validateMeta()">
Validate Meta Tags
</button>

<button class="secondary" onclick="clearAll()">
Clear
</button>

</div>

</div>

<div class="panel">

<div class="results" id="results">

<div class="item">
Ready to validate meta tags
</div>

</div>

</div>

</section>

<footer class="footer">
© <span id="year"></span> Toolivo. All rights reserved.
</footer>

</div>

<script>
function validateMeta(){

const html = document.getElementById("htmlInput").value;

if(!html.trim()){
alert("Please enter HTML.");
return;
}

const parser = new DOMParser();

const doc = parser.parseFromString(html,"text/html");

const results = document.getElementById("results");

results.innerHTML = "";

const checks = [

{
name:"Title Tag",
exists:!!doc.querySelector("title")
},

{
name:"Meta Description",
exists:!!doc.querySelector('meta[name="description"]')
},

{
name:"Viewport Tag",
exists:!!doc.querySelector('meta[name="viewport"]')
},

{
name:"Canonical Tag",
exists:!!doc.querySelector('link[rel="canonical"]')
},

{
name:"Open Graph Title",
exists:!!doc.querySelector('meta[property="og:title"]')
},

{
name:"Open Graph Description",
exists:!!doc.querySelector('meta[property="og:description"]')
}

];

checks.forEach(check=>{

results.innerHTML += `
<div class="item">

<div class="${
check.exists ? "good" : "bad"
}">
${check.exists ? "✔" : "✘"} ${check.name}
</div>

</div>
`;

});

}

function clearAll(){

document.getElementById("htmlInput").value = "";

document.getElementById("results").innerHTML = `
<div class="item">
Ready to validate meta tags
</div>
`;
}

document.getElementById("year").innerText =
new Date().getFullYear();
</script>

</body>
</html>
