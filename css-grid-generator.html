<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Grid Generator - Toolivo</title>
<meta name="description" content="Generate CSS Grid layouts instantly with live preview and copyable CSS code.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;padding:20px}
.container{max-width:1100px;margin:auto}
.title{font-size:32px;font-weight:bold;margin-bottom:10px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{color:#94a3b8;margin-bottom:25px;line-height:1.6}
.card{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
.control{margin-bottom:18px}
label{display:block;margin-bottom:8px;color:#cbd5e1;font-size:14px}
input,select{width:100%;background:#020617;border:1px solid #334155;color:white;border-radius:12px;padding:14px;outline:none}
input[type="range"]{accent-color:#0ea5e9;padding:0}
.value{margin-top:6px;color:#38bdf8;font-size:14px}
.preview{
    min-height:360px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:18px;
    display:grid;
}
.item{
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
button{padding:13px 20px;border:none;border-radius:12px;font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(90deg,#06b6d4,#3b82f6);color:white}
.copy{background:#1e293b;color:white}
textarea{width:100%;height:220px;margin-top:18px;background:#020617;border:1px solid #1e293b;color:#38bdf8;border-radius:12px;padding:15px;resize:vertical;line-height:1.5}
.footer{text-align:center;color:#64748b;margin-top:25px;font-size:14px}
</style>
</head>

<body>

<div class="container">

    <div class="title">CSS Grid Generator</div>
    <div class="desc">Generate CSS Grid layouts instantly with live preview and copyable CSS code.</div>

    <div class="card">

        <div class="grid">

            <div>
                <div class="control">
                    <label>Columns</label>
                    <input type="range" id="columns" min="1" max="8" value="3">
                    <div class="value" id="columnsValue">3 columns</div>
                </div>

                <div class="control">
                    <label>Rows</label>
                    <input type="range" id="rows" min="1" max="6" value="3">
                    <div class="value" id="rowsValue">3 rows</div>
                </div>

                <div class="control">
                    <label>Gap</label>
                    <input type="range" id="gap" min="0" max="50" value="12">
                    <div class="value" id="gapValue">12px</div>
                </div>

                <div class="control">
                    <label>Column Size</label>
                    <select id="columnSize">
                        <option value="1fr">1fr</option>
                        <option value="auto">auto</option>
                        <option value="minmax(0, 1fr)">minmax(0, 1fr)</option>
                        <option value="100px">100px</option>
                        <option value="200px">200px</option>
                    </select>
                </div>

                <div class="control">
                    <label>Row Size</label>
                    <select id="rowSize">
                        <option value="100px">100px</option>
                        <option value="auto">auto</option>
                        <option value="1fr">1fr</option>
                        <option value="150px">150px</option>
                        <option value="200px">200px</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="preview" id="preview"></div>
            </div>

        </div>

        <div class="buttons">
            <button class="generate" onclick="generateGrid()">Generate</button>
            <button class="copy" onclick="copyCSS()">Copy CSS</button>
        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">Toolivo © 2026</div>

</div>

<script>
function generateGrid(){

    const columns = document.getElementById("columns").value;
    const rows = document.getElementById("rows").value;
    const gap = document.getElementById("gap").value;
    const columnSize = document.getElementById("columnSize").value;
    const rowSize = document.getElementById("rowSize").value;

    document.getElementById("columnsValue").innerText = columns + " columns";
    document.getElementById("rowsValue").innerText = rows + " rows";
    document.getElementById("gapValue").innerText = gap + "px";

    const preview = document.getElementById("preview");

    preview.style.gridTemplateColumns = `repeat(${columns}, ${columnSize})`;
    preview.style.gridTemplateRows = `repeat(${rows}, ${rowSize})`;
    preview.style.gap = gap + "px";

    preview.innerHTML = "";

    const total = columns * rows;

    for(let i = 1; i <= total; i++){
        const div = document.createElement("div");
        div.className = "item";
        div.innerText = i;
        preview.appendChild(div);
    }

    const css =
`.grid-container{
    display:grid;
    grid-template-columns:repeat(${columns}, ${columnSize});
    grid-template-rows:repeat(${rows}, ${rowSize});
    gap:${gap}px;
}`;

    document.getElementById("output").value = css;
}

function copyCSS(){
    navigator.clipboard.writeText(document.getElementById("output").value);
    alert("Copied!");
}

document.querySelectorAll("input,select").forEach(el => {
    el.addEventListener("input", generateGrid);
});

generateGrid();
</script>

</body>
</html>
