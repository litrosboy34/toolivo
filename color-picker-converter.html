<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker Converter — Toolivo</title>
<meta name="description" content="Convert HEX, RGB and HSL colors instantly with Toolivo. Free online color picker and converter.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#05070d;
color:white;
}

.wrap{
width:min(1000px,calc(100% - 28px));
margin:auto;
padding:40px 0;
}

h1{
font-size:56px;
margin:20px 0 10px;
}

p{
color:#9ca8bb;
margin-bottom:25px;
}

.panel{
background:#0b1020;
border:1px solid #263244;
border-radius:20px;
padding:18px;
margin-top:18px;
}

.colorBox{
width:100%;
height:180px;
border-radius:18px;
border:1px solid #263244;
margin-bottom:18px;
background:#39e6d2;
}

input[type=color]{
width:100%;
height:70px;
border:none;
border-radius:18px;
background:none;
cursor:pointer;
margin-bottom:18px;
}

.field{
margin-bottom:16px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:#9ca8bb;
}

.text{
width:100%;
height:52px;
border-radius:14px;
border:1px solid #263244;
background:#05070d;
color:white;
padding:0 14px;
font-size:16px;
box-sizing:border-box;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

button{
padding:15px 20px;
border:0;
border-radius:16px;
background:linear-gradient(90deg,#39e6d2,#6ea8ff);
font-weight:800;
cursor:pointer;
margin-top:10px;
}

.copy{
background:#121935;
color:white;
border:1px solid #263244;
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr;
}

h1{
font-size:42px;
}
}
</style>
</head>
<body>

<div class="wrap">

<h1>Color Picker / Converter</h1>

<p>
Convert HEX, RGB and HSL colors instantly with Toolivo.
</p>

<div class="panel">

<div class="colorBox" id="preview"></div>

<input type="color" id="picker" value="#39e6d2">

<div class="grid">

<div class="field">
<label>HEX</label>
<input class="text" id="hex" value="#39e6d2">
</div>

<div class="field">
<label>RGB</label>
<input class="text" id="rgb">
</div>

<div class="field">
<label>HSL</label>
<input class="text" id="hsl">
</div>

<div class="field">
<label>CSS</label>
<input class="text" id="css">
</div>

</div>

<button onclick="copyField('hex')">Copy HEX</button>
<button class="copy" onclick="copyField('rgb')">Copy RGB</button>
<button class="copy" onclick="copyField('hsl')">Copy HSL</button>

</div>

</div>

<script>
const picker=document.getElementById('picker');
const preview=document.getElementById('preview');

const hex=document.getElementById('hex');
const rgb=document.getElementById('rgb');
const hsl=document.getElementById('hsl');
const css=document.getElementById('css');

function hexToRgb(hexVal){

hexVal=hexVal.replace('#','');

const bigint=parseInt(hexVal,16);

const r=(bigint>>16)&255;
const g=(bigint>>8)&255;
const b=bigint&255;

return {r,g,b};
}

function rgbToHsl(r,g,b){

r/=255;
g/=255;
b/=255;

const max=Math.max(r,g,b);
const min=Math.min(r,g,b);

let h,s,l=(max+min)/2;

if(max===min){
h=s=0;
}else{

const d=max-min;

s=l>0.5?d/(2-max-min):d/(max+min);

switch(max){

case r:
h=(g-b)/d+(g<b?6:0);
break;

case g:
h=(b-r)/d+2;
break;

case b:
h=(r-g)/d+4;
break;

}

h/=6;
}

return {
h:Math.round(h*360),
s:Math.round(s*100),
l:Math.round(l*100)
};
}

function update(){

const value=picker.value;

preview.style.background=value;

hex.value=value;

const rgbVal=hexToRgb(value);

rgb.value=`rgb(${rgbVal.r}, ${rgbVal.g}, ${rgbVal.b})`;

const hslVal=rgbToHsl(rgbVal.r,rgbVal.g,rgbVal.b);

hsl.value=`hsl(${hslVal.h}, ${hslVal.s}%, ${hslVal.l}%)`;

css.value=`color: ${value};`;
}

picker.addEventListener('input',update);

hex.addEventListener('input',()=>{

if(/^#([0-9A-F]{3}){1,2}$/i.test(hex.value)){
picker.value=hex.value;
update();
}

});

function copyField(id){
navigator.clipboard.writeText(document.getElementById(id).value);
}

update();
</script>

</body>
</html>
