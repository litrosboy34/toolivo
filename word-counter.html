<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — Toolivo</title>
<meta name="description" content="Count words, characters, sentences, paragraphs and reading time instantly with Toolivo.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#05070d;color:white}
.wrap{width:min(1000px,calc(100% - 28px));margin:auto;padding:40px 0}
h1{font-size:56px;margin:30px 0 10px}
p{color:#9ca8bb}
textarea{width:100%;min-height:300px;border-radius:20px;border:1px solid #263244;background:#0b1020;color:white;padding:18px;font-size:17px;line-height:1.6;box-sizing:border-box}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:18px}
.card{background:#0b1020;border:1px solid #263244;border-radius:18px;padding:18px;text-align:center}
.card b{font-size:30px;display:block}
.card span{color:#9ca8bb;font-size:14px}
button{margin-top:14px;padding:14px 20px;border:0;border-radius:14px;background:linear-gradient(90deg,#39e6d2,#6ea8ff);font-weight:800;cursor:pointer}
@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}h1{font-size:42px}}
.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
padding:10px 0 25px;
flex-wrap:wrap;
}

.brand{
display:flex;
align-items:center;
gap:0px;
font-size:30px;
font-weight:bold;
text-decoration:none;
}

.brand img{
width:100px;
height:100px;
object-fit:contain;
filter:
drop-shadow(0 0 30px rgba(57,230,210,.45))
drop-shadow(0 18px 40px rgba(0,0,0,.6));
}

.brand span{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.topnav{
display:flex;
align-items:center;
gap:14px;
flex-wrap:wrap;
}

.topnav a{
color:#94a3b8;
text-decoration:none;
font-size:14px;
transition:.2s;
}

.topnav a:hover{
color:white;
}
</style>
</head>
<body>
<div id="header"></div>
<div class="wrap">
<h1>Word Counter</h1>
<p>Paste your text and instantly count words, characters, sentences, paragraphs and reading time.</p>

<textarea id="text" placeholder="Paste or type your text here..."></textarea>

<div class="grid">
<div class="card"><b id="words">0</b><span>Words</span></div>
<div class="card"><b id="chars">0</b><span>Characters</span></div>
<div class="card"><b id="charsNoSpace">0</b><span>No spaces</span></div>
<div class="card"><b id="sentences">0</b><span>Sentences</span></div>
<div class="card"><b id="paragraphs">0</b><span>Paragraphs</span></div>
</div>

<div class="card" style="margin-top:12px">
<b id="reading">0 min</b>
<span>Estimated reading time</span>
</div>

<button id="clear">Clear Text</button>
</div>

<script>
const text=document.getElementById('text');
const ids=['words','chars','charsNoSpace','sentences','paragraphs','reading'];
function count(){
 const v=text.value.trim();
 const raw=text.value;
 const words=v?v.split(/\s+/).filter(Boolean).length:0;
 const chars=raw.length;
 const charsNoSpace=raw.replace(/\s/g,'').length;
 const sentences=v?(v.match(/[.!?]+/g)||[]).length:0;
 const paragraphs=v?v.split(/\n+/).filter(p=>p.trim()).length:0;
 const reading=words?Math.max(1,Math.ceil(words/200)):0;
 document.getElementById('words').textContent=words;
 document.getElementById('chars').textContent=chars;
 document.getElementById('charsNoSpace').textContent=charsNoSpace;
 document.getElementById('sentences').textContent=sentences;
 document.getElementById('paragraphs').textContent=paragraphs;
 document.getElementById('reading').textContent=reading+' min';
}
text.addEventListener('input',count);
document.getElementById('clear').onclick=()=>{text.value='';count()};
count();
</script>
 <script>
fetch('/header.html')
.then(res => res.text())
.then(data => {
document.getElementById('header').innerHTML = data;
});
</script>
</body>
</html>
