<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVG Blob Generator - Toolivo</title>
<meta name="description" content="Generate random SVG blobs instantly with live preview and downloadable SVG code.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input[type="color"],
input[type="range"]{
    width:100%;
}

input[type="color"]{
    height:60px;
    border:none;
    border-radius:12px;
    background:none;
    cursor:pointer;
}

input[type="range"]{
    accent-color:#0ea5e9;
}

.value{
    margin-top:6px;
    color:#38bdf8;
    font-size:14px;
}

.preview{
    min-height:360px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.preview svg{
    width:320px;
    height:320px;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

.download{
    background:#020617;
    border:1px solid #334155;
    color:white;
}

textarea{
    width:100%;
    height:260px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">SVG Blob Generator</div>

    <div class="desc">
        Generate random SVG blobs instantly with live preview and downloadable SVG code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Blob Color</label>
                    <input type="color" id="color" value="#06b6d4">
                </div>

                <div class="control">
                    <label>Blob Size</label>
                    <input type="range" id="size" min="100" max="400" value="260">
                    <div class="value" id="sizeVal">260px</div>
                </div>

                <div class="control">
                    <label>Border Radius Randomness</label>
                    <input type="range" id="randomness" min="10" max="80" value="40">
                    <div class="value" id="randomnessVal">40</div>
                </div>

            </div>

            <div>

                <div class="preview" id="preview"></div>

            </div>

        </div>

        <div class="buttons">

            <button class="generate" onclick="generateBlob()">
                Generate
            </button>

            <button class="copy" onclick="copySVG()">
                Copy SVG
            </button>

            <button class="download" onclick="downloadSVG()">
                Download SVG
            </button>

        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
let currentSVG = "";

function random(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function generateBlob(){

    const color =
    document.getElementById("color").value;

    const size =
    document.getElementById("size").value;

    const randomness =
    parseInt(document.getElementById("randomness").value);

    document.getElementById("sizeVal").innerText =
    size + "px";

    document.getElementById("randomnessVal").innerText =
    randomness;

    const r1 = random(20,randomness);
    const r2 = random(20,randomness);
    const r3 = random(20,randomness);
    const r4 = random(20,randomness);

    currentSVG =
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<path fill="${color}" d="
M 40 20
Q 180 ${r1} 160 100
Q ${180-r2} 180 100 160
Q ${r3} ${180-r4} 20 100
Q ${20+r1} ${20+r2} 40 20
Z"/>
</svg>`;

    document.getElementById("preview").innerHTML =
    currentSVG;

    document.querySelector(".preview svg").style.width =
    size + "px";

    document.querySelector(".preview svg").style.height =
    size + "px";

    document.getElementById("output").value =
    currentSVG;
}

function copySVG(){

    navigator.clipboard.writeText(currentSVG);

    alert("SVG copied!");
}

function downloadSVG(){

    const blob = new Blob([currentSVG], {
        type:"image/svg+xml"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "toolivo-blob.svg";

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(url);
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", generateBlob);
});

generateBlob();
</script>

</body>
</html>
