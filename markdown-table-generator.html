<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Markdown Table Generator - Toolivo</title>

<meta name="description" content="Generate Markdown tables instantly with live preview and copyable code.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input{
    width:100%;
    accent-color:#0ea5e9;
}

.preview{
    min-height:340px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    overflow:auto;
}

.preview pre{
    color:#38bdf8;
    white-space:pre-wrap;
    line-height:1.6;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

textarea{
    width:100%;
    height:260px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Markdown Table Generator</div>

    <div class="desc">
        Generate Markdown tables instantly with live preview and copyable code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Rows</label>
                    <input type="range" id="rows" min="1" max="15" value="4">
                </div>

                <div class="control">
                    <label>Columns</label>
                    <input type="range" id="columns" min="1" max="10" value="4">
                </div>

            </div>

            <div>

                <div class="preview">
                    <pre id="preview"></pre>
                </div>

            </div>

        </div>

        <div class="buttons">

            <button class="generate" onclick="generateMarkdown()">
                Generate
            </button>

            <button class="copy" onclick="copyMarkdown()">
                Copy Markdown
            </button>

        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateMarkdown(){

    const rows =
    parseInt(document.getElementById("rows").value);

    const columns =
    parseInt(document.getElementById("columns").value);

    let markdown = "";

    // Header
    markdown += "| ";

    for(let i=1;i<=columns;i++){

        markdown += `Header ${i} | `;
    }

    markdown += "\\n| ";

    // Separator
    for(let i=1;i<=columns;i++){

        markdown += "--- | ";
    }

    markdown += "\\n";

    // Rows
    for(let r=1;r<=rows;r++){

        markdown += "| ";

        for(let c=1;c<=columns;c++){

            markdown += `Row ${r} Col ${c} | `;
        }

        markdown += "\\n";
    }

    document.getElementById("output").value =
    markdown;

    document.getElementById("preview").innerText =
    markdown;
}

function copyMarkdown(){

    navigator.clipboard.writeText(
        document.getElementById("output").value
    );

    alert("Copied!");
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", generateMarkdown);
});

generateMarkdown();
</script>

</body>
</html>
