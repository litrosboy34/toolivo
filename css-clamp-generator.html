<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Clamp Generator - Toolivo</title>

<meta name="description" content="Generate responsive CSS clamp() values instantly with live preview and copyable code.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:950px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:800px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

input[type="number"],
input[type="range"]{
    width:100%;
    background:#020617;
    border:1px solid #334155;
    color:white;
    border-radius:12px;
    padding:14px;
    outline:none;
}

input[type="range"]{
    accent-color:#0ea5e9;
    padding:0;
}

.value{
    margin-top:6px;
    color:#38bdf8;
    font-size:14px;
}

.preview{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:18px;
    min-height:320px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:30px;
}

.preview-text{
    font-weight:bold;
    line-height:1.4;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

textarea{
    width:100%;
    height:180px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">CSS Clamp Generator</div>

    <div class="desc">
        Generate responsive CSS clamp() values instantly with live preview and copyable code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Minimum Size (px)</label>

                    <input type="range" id="min" min="8" max="80" value="16">

                    <div class="value" id="minValue">
                        16px
                    </div>
                </div>

                <div class="control">
                    <label>Preferred Viewport Width (vw)</label>

                    <input type="range" id="preferred" min="1" max="20" value="4">

                    <div class="value" id="preferredValue">
                        4vw
                    </div>
                </div>

                <div class="control">
                    <label>Maximum Size (px)</label>

                    <input type="range" id="max" min="20" max="120" value="42">

                    <div class="value" id="maxValue">
                        42px
                    </div>
                </div>

            </div>

            <div>

                <div class="preview">

                    <div class="preview-text" id="previewText">
                        Responsive Clamp Text
                    </div>

                </div>

            </div>

        </div>

        <div class="buttons">

            <button class="generate" onclick="generateClamp()">
                Generate
            </button>

            <button class="copy" onclick="copyCSS()">
                Copy CSS
            </button>

        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateClamp(){

    const min =
    document.getElementById("min").value;

    const preferred =
    document.getElementById("preferred").value;

    const max =
    document.getElementById("max").value;

    document.getElementById("minValue").innerText =
    min + "px";

    document.getElementById("preferredValue").innerText =
    preferred + "vw";

    document.getElementById("maxValue").innerText =
    max + "px";

    const clampValue =
    `clamp(${min}px, ${preferred}vw, ${max}px)`;

    document.getElementById("previewText").style.fontSize =
    clampValue;

    document.getElementById("output").value =
`font-size: ${clampValue};`;
}

function copyCSS(){

    navigator.clipboard.writeText(
        document.getElementById("output").value
    );

    alert("Copied!");
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", generateClamp);
});

generateClamp();
</script>

</body>
</html>
