<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3QBF2V9J5T"></script>
<script>
gtag('js', new Date());
gtag('config', 'G-3QBF2V9J5T', { send_page_view: true });

<title>Word Frequency Counter — Toolivo</title>
<meta name="description" content="Count word frequency instantly. Analyze repeated words and text statistics with Toolivo.">
<link rel="icon" href="https://i.imgur.com/7qzyyTa.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;min-height:100vh}
a{text-decoration:none;color:inherit}
.container{max-width:1200px;margin:auto;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;gap:15px;padding:6px 0;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:0;font-size:34px;font-weight:bold}
.logo img{width:115px;height:115px;object-fit:contain;filter:drop-shadow(0 0 34px rgba(57,230,210,.55)) drop-shadow(0 20px 46px rgba(0,0,0,.62));transform:translateY(4px)}
.logo span{background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.nav a{color:#94a3b8;font-size:14px}
.nav a:hover{color:white}
.tool-hero{padding:45px 0 28px}
.tool-hero h1{font-size:clamp(42px,7vw,64px);margin-bottom:14px}
.tool-hero p{max-width:760px;color:#94a3b8;line-height:1.7;font-size:18px}
.gradient{background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.panel{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:20px}
textarea{
width:100%;
height:340px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:18px;
padding:18px;
resize:vertical;
outline:none;
font-size:15px;
line-height:1.6;
}
textarea:focus{border-color:#38bdf8}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
button{
padding:15px 20px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
font-size:15px;
}
.primary{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
}
.secondary{
background:#020617;
border:1px solid #334155;
color:#cbd5e1;
}
.results{
background:#020617;
border:1px solid #334155;
border-radius:18px;
padding:18px;
max-height:430px;
overflow:auto;
}
.word{
display:flex;
justify-content:space-between;
padding:14px;
border-bottom:1px solid #1e293b;
}
.word:last-child{border-bottom:none}
.word-name{font-weight:bold;color:#e2e8f0}
.word-count{color:#67e8f9}
.footer{
margin-top:55px;
padding:30px 0;
border-top:1px solid #1e293b;
text-align:center;
color:#64748b;
}
@media(max-width:900px){
.grid{grid-template-columns:1fr}
.header{flex-direction:column}
.logo img{width:95px;height:95px}
}
</style>
</head>

<body>

<div class="container">

<header class="header">

<a href="/" class="logo">
<img src="https://i.imgur.com/7qzyyTa.png" alt="Toolivo">
<span>Toolivo</span>
</a>

<nav class="nav">
<a href="/">Home</a>
<a href="/tools.html">Tools</a>
<a href="/about.html">About</a>
</nav>

</header>

<section class="tool-hero">

<h1>Word Frequency <span class="gradient">Counter</span></h1>

<p>
Analyze repeated words and count word frequency instantly from any text content.
</p>

</section>

<section class="grid">

<div class="panel">

<textarea
id="textInput"
placeholder="Paste your text here..."
></textarea>

<div class="buttons">
<button class="primary" onclick="analyzeWords()">
Analyze Words
</button>

<button class="secondary" onclick="clearAll()">
Clear
</button>
</div>

</div>

<div class="panel">

<div class="results" id="results">

<div class="word">
<div class="word-name">Ready</div>
<div class="word-count">0</div>
</div>

</div>

</div>

</section>

<footer class="footer">
© <span id="year"></span> Toolivo. All rights reserved.
</footer>

</div>

<script>
function analyzeWords(){

const text = document.getElementById("textInput").value;

if(!text.trim()){
alert("Please enter text.");
return;
}

const words = text
.toLowerCase()
.replace(/[^\w\s']/g," ")
.split(/\s+/)
.filter(word => word.length > 2);

const counts = {};

words.forEach(word=>{
counts[word] = (counts[word] || 0) + 1;
});

const sorted = Object.entries(counts)
.sort((a,b)=>b[1]-a[1]);

const results = document.getElementById("results");

results.innerHTML = "";

sorted.forEach(([word,count])=>{

results.innerHTML += `
<div class="word">
<div class="word-name">${escapeHtml(word)}</div>
<div class="word-count">${count}</div>
</div>
`;

});

}

function escapeHtml(text){
const div = document.createElement("div");
div.innerText = text;
return div.innerHTML;
}

function clearAll(){
document.getElementById("textInput").value = "";

document.getElementById("results").innerHTML = `
<div class="word">
<div class="word-name">Ready</div>
<div class="word-count">0</div>
</div>
`;
}

document.getElementById("year").innerText =
new Date().getFullYear();
</script>

</body>
</html>
