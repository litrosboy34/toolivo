<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSV to JSON Converter - Toolivo</title>
<meta name="description" content="Convert CSV to JSON instantly with copyable output.">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;padding:20px}
.container{max-width:1050px;margin:auto}
.title{font-size:32px;font-weight:bold;margin-bottom:10px;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{color:#94a3b8;margin-bottom:25px;line-height:1.6}
.card{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
label{display:block;margin-bottom:8px;color:#cbd5e1;font-size:14px}
textarea{width:100%;height:360px;background:#020617;border:1px solid #1e293b;color:#38bdf8;border-radius:12px;padding:15px;resize:vertical;line-height:1.5}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
button{padding:13px 20px;border:none;border-radius:12px;font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(90deg,#06b6d4,#3b82f6);color:white}
.copy{background:#1e293b;color:white}
.clear{background:#020617;color:white;border:1px solid #334155}
.message{margin-top:15px;color:#94a3b8;font-size:14px}
.footer{text-align:center;color:#64748b;margin-top:25px;font-size:14px}
</style>
</head>

<body>

<div class="container">

<div class="title">CSV to JSON Converter</div>

<div class="desc">
Convert CSV data to JSON instantly. Paste CSV, generate JSON, and copy the result.
</div>

<div class="card">

<div class="grid">

<div>
<label>CSV Input</label>

<textarea id="csvInput" placeholder="name,age,city
John,30,London
Jane,25,Paris"></textarea>
</div>

<div>
<label>JSON Output</label>

<textarea id="jsonOutput" placeholder="JSON output will appear here..."></textarea>
</div>

</div>

<div class="buttons">

<button class="generate" onclick="convertCSVtoJSON()">
Convert
</button>

<button class="copy" onclick="copyJSON()">
Copy JSON
</button>

<button class="clear" onclick="clearAll()">
Clear
</button>

</div>

<div class="message" id="message"></div>

</div>

<div class="footer">
Toolivo © 2026
</div>

</div>

<script>
function parseCSVLine(line){

    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i = 0; i < line.length; i++){

        const char = line[i];

        if(char === '"'){

            insideQuotes = !insideQuotes;

        }else if(char === "," && !insideQuotes){

            result.push(current.trim());

            current = "";

        }else{

            current += char;
        }
    }

    result.push(current.trim());

    return result.map(item =>
        item.replace(/^"(.*)"$/, "$1")
    );
}

function convertCSVtoJSON(){

    const input =
    document.getElementById("csvInput").value.trim();

    const message =
    document.getElementById("message");

    if(!input){

        message.innerText =
        "Please paste CSV first.";

        return;
    }

    try{

        const lines =
        input.split(/\r?\n/);

        if(lines.length < 2){

            message.innerText =
            "CSV must contain headers and rows.";

            return;
        }

        const headers =
        parseCSVLine(lines[0]);

        const result = [];

        for(let i = 1; i < lines.length; i++){

            if(!lines[i].trim()) continue;

            const values =
            parseCSVLine(lines[i]);

            let obj = {};

            headers.forEach((header,index) => {

                obj[header] =
                values[index] || "";
            });

            result.push(obj);
        }

        document.getElementById("jsonOutput").value =
        JSON.stringify(result,null,2);

        message.innerText =
        "Converted successfully.";

    }catch(error){

        message.innerText =
        "Invalid CSV format.";
    }
}

function copyJSON(){

    const output =
    document.getElementById("jsonOutput");

    if(!output.value){

        alert("Convert CSV first.");

        return;
    }

    navigator.clipboard.writeText(output.value);

    alert("Copied!");
}

function clearAll(){

    document.getElementById("csvInput").value = "";

    document.getElementById("jsonOutput").value = "";

    document.getElementById("message").innerText = "";
}
</script>

</body>
</html>
