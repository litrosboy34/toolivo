<title>CSV Viewer — Toolivo</title>

<meta name="description" content="View CSV files instantly with Toolivo.">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

a{
text-decoration:none;
color:inherit;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
padding:6px 0;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:0;
font-size:34px;
font-weight:bold;
}

.logo img{
width:115px;
height:115px;
object-fit:contain;
filter:drop-shadow(0 0 34px rgba(57,230,210,.55))
drop-shadow(0 20px 46px rgba(0,0,0,.62));
transform:translateY(4px);
}

.logo span{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav{
display:flex;
align-items:center;
gap:14px;
flex-wrap:wrap;
}

.nav a{
color:#94a3b8;
font-size:14px;
transition:.2s;
}

.nav a:hover{
color:white;
}

.tool-hero{
padding:45px 0 28px;
}

.tool-hero h1{
font-size:clamp(42px,7vw,64px);
line-height:1.05;
margin-bottom:14px;
}

.tool-hero p{
max-width:760px;
color:#94a3b8;
line-height:1.7;
font-size:18px;
}

.gradient{
background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.panel{
background:#111827;
border:1px solid #1e293b;
border-radius:18px;
padding:20px;
margin-top:20px;
overflow:auto;
}

textarea{
width:100%;
height:220px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:18px;
padding:18px;
resize:vertical;
line-height:1.6;
font-size:14px;
outline:none;
font-family:monospace;
}

textarea:focus{
border-color:#38bdf8;
}

.buttons{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

button{
padding:15px 20px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
font-size:15px;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.primary{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #334155;
padding:12px;
text-align:left;
}

th{
background:#020617;
}

.footer{
margin-top:55px;
padding:30px 0;
border-top:1px solid #1e293b;
color:#64748b;
text-align:center;
}

.footer-links{
display:flex;
gap:16px;
justify-content:center;
flex-wrap:wrap;
margin-top:12px;
}

.footer-links a:hover{
color:white;
}

</style>
</head>

<body>

<div class="container">

<header class="header">

<a href="/" class="logo">
<img src="https://i.imgur.com/7qzyyTa.png" alt="Toolivo">
<span>Toolivo</span>
</a>

<nav class="nav">
<a href="/">Home</a>
<a href="/tools.html">Tools</a>
<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/contact.html">Contact</a>
</nav>

</header>

<section class="tool-hero">

<h1>CSV <span class="gradient">Viewer</span></h1>

<p>
View CSV data instantly in a clean table format.
</p>

</section>

<section class="panel">

<textarea
id="input"
placeholder="Paste CSV data here..."
></textarea>

<div class="buttons">

<button class="primary" onclick="viewCSV()">
View CSV
</button>

</div>

<div id="tableContainer"></div>

</section>

<footer class="footer">

<div>
© <span id="year"></span> Toolivo. All rights reserved.
</div>

<div class="footer-links">
<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/terms.html">Terms</a>
<a href="/contact.html">Contact</a>
<a href="/sitemap.xml">Sitemap</a>
</div>

</footer>

</div>

<script>

function viewCSV(){

const csv =
document.getElementById("input")
.value
.trim();

if(!csv){
alert("Please enter CSV data.");
return;
}

const rows =
csv.split("\n")
.map(row => row.split(","));

let table = "<table>";

rows.forEach((row,index)=>{

table += "<tr>";

row.forEach(col=>{

table += index === 0
? `<th>${col}</th>`
: `<td>${col}</td>`;

});

table += "</tr>";

});

table += "</table>";

document.getElementById("tableContainer").innerHTML =
table;
}

document.getElementById("year").innerText =
new Date().getFullYear();

</script>

</body>
</html>
