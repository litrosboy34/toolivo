<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Canonical URL Generator - Toolivo</title>

<meta name="description" content="Generate canonical URL tags instantly for SEO optimization.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:30px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:10px;
    color:#cbd5e1;
    font-size:14px;
}

input{
    width:100%;
    background:#020617;
    border:1px solid #334155;
    color:white;
    border-radius:12px;
    padding:15px;
    outline:none;
}

.preview{
    margin-top:20px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:14px;
    padding:20px;
}

.preview h3{
    margin-bottom:12px;
    color:#38bdf8;
}

.preview p{
    color:#94a3b8;
    line-height:1.6;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
    flex-wrap:wrap;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

button:hover{
    opacity:0.9;
    transform:translateY(-2px);
}

textarea{
    width:100%;
    height:160px;
    margin-top:20px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:30px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Canonical URL Generator</div>

    <div class="desc">
        Generate canonical URL tags instantly for SEO optimization and duplicate content prevention.
    </div>

    <div class="card">

        <label>Canonical URL</label>

        <input
            type="text"
            id="urlInput"
            placeholder="https://toolivo.site/page"
        >

        <div class="preview">

            <h3>What is a Canonical URL?</h3>

            <p>
                Canonical tags help search engines understand the main version
                of a webpage and prevent duplicate content SEO issues.
            </p>

        </div>

        <div class="buttons">

            <button class="generate" onclick="generateCanonical()">
                Generate
            </button>

            <button class="copy" onclick="copyCode()">
                Copy
            </button>

        </div>

        <textarea
            id="output"
            placeholder="Generated canonical tag will appear here..."
        ></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateCanonical(){

    const url = document.getElementById("urlInput").value.trim();

    if(!url){
        alert("Please enter a URL.");
        return;
    }

    const code =
`<link rel="canonical" href="${url}">`;

    document.getElementById("output").value = code;
}

function copyCode(){

    const output = document.getElementById("output");

    if(!output.value){
        alert("Generate canonical tag first.");
        return;
    }

    navigator.clipboard.writeText(output.value);

    alert("Copied!");
}
</script>

</body>
</html>
