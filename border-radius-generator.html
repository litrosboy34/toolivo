<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Border Radius Generator - Toolivo</title>

<meta name="description" content="Generate CSS border radius instantly with live preview and copyable CSS code.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:950px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    color:#94a3b8;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:750px){
    .grid{
        grid-template-columns:1fr;
    }
}

.control{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

.range-wrap{
    display:flex;
    align-items:center;
    gap:15px;
}

.range-wrap input{
    width:100%;
    accent-color:#0ea5e9;
}

.range-wrap span{
    width:55px;
    color:#38bdf8;
    font-size:14px;
}

.preview-area{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:320px;
    background:#020617;
    border:1px solid #1e293b;
    border-radius:16px;
}

.preview-box{
    width:230px;
    height:230px;
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
    transition:0.15s;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:13px 20px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.generate{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.copy{
    background:#1e293b;
    color:white;
}

button:hover{
    opacity:0.9;
    transform:translateY(-2px);
}

textarea{
    width:100%;
    height:140px;
    margin-top:18px;
    background:#020617;
    border:1px solid #1e293b;
    color:#38bdf8;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#64748b;
    margin-top:25px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Border Radius Generator</div>

    <div class="desc">
        Generate CSS border radius instantly with live preview and copyable CSS code.
    </div>

    <div class="card">

        <div class="grid">

            <div>

                <div class="control">
                    <label>Top Left</label>

                    <div class="range-wrap">
                        <input type="range" id="tl" min="0" max="150" value="20">
                        <span id="tlVal">20px</span>
                    </div>
                </div>

                <div class="control">
                    <label>Top Right</label>

                    <div class="range-wrap">
                        <input type="range" id="tr" min="0" max="150" value="20">
                        <span id="trVal">20px</span>
                    </div>
                </div>

                <div class="control">
                    <label>Bottom Right</label>

                    <div class="range-wrap">
                        <input type="range" id="br" min="0" max="150" value="20">
                        <span id="brVal">20px</span>
                    </div>
                </div>

                <div class="control">
                    <label>Bottom Left</label>

                    <div class="range-wrap">
                        <input type="range" id="bl" min="0" max="150" value="20">
                        <span id="blVal">20px</span>
                    </div>
                </div>

            </div>

            <div class="preview-area">
                <div class="preview-box" id="previewBox"></div>
            </div>

        </div>

        <div class="buttons">
            <button class="generate" onclick="generateRadius()">
                Generate
            </button>

            <button class="copy" onclick="copyCSS()">
                Copy CSS
            </button>
        </div>

        <textarea id="output"></textarea>

    </div>

    <div class="footer">
        Toolivo © 2026
    </div>

</div>

<script>
function generateRadius(){

    const tl = document.getElementById("tl").value;
    const tr = document.getElementById("tr").value;
    const br = document.getElementById("br").value;
    const bl = document.getElementById("bl").value;

    document.getElementById("tlVal").innerText = tl + "px";
    document.getElementById("trVal").innerText = tr + "px";
    document.getElementById("brVal").innerText = br + "px";
    document.getElementById("blVal").innerText = bl + "px";

    const radius = `${tl}px ${tr}px ${br}px ${bl}px`;

    document.getElementById("previewBox").style.borderRadius = radius;

    document.getElementById("output").value =
`border-radius: ${radius};`;
}

function copyCSS(){

    const output = document.getElementById("output");

    navigator.clipboard.writeText(output.value);

    alert("Copied!");
}

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", generateRadius);
});

generateRadius();
</script>

</body>
</html>
